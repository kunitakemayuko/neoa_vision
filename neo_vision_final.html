<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>NEO ACADEMIA 3期生 — ビジョン別グループ分析</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Hiragino Kaku Gothic ProN','Noto Sans JP',sans-serif;background:#0b0b0e;color:#f0ede8;min-height:100vh}
.hd{padding:1.75rem 2rem 1.1rem;border-bottom:1px solid #1e1e28}
.hd h1{font-size:1.4rem;font-weight:700;letter-spacing:.05em}
.hd h1 em{color:#e8ff00;font-style:normal}
.hd p{margin-top:.3rem;font-size:.78rem;color:#555}
.tabs{display:flex;border-bottom:1px solid #1e1e28;padding:0 2rem;overflow-x:auto}
.tab{padding:.65rem 1rem;font-size:.85rem;color:#555;cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;transition:all .15s}
.tab:hover{color:#ccc}
.tab.on{color:#e8ff00;border-bottom-color:#e8ff00}
.pg{display:none;padding:1.5rem 2rem 4rem}
.pg.on{display:block}

/* ===== OVERVIEW ===== */
.ov-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:1rem;margin-bottom:2rem}
.ov-card{background:#111117;border:1px solid #1e1e28;border-radius:12px;overflow:hidden;cursor:pointer;transition:transform .15s,border-color .2s}
.ov-card:hover{transform:translateY(-2px)}
.ov-head{padding:1rem 1.1rem .7rem;display:flex;align-items:center;gap:.7rem}
.ov-icon-wrap{width:42px;height:42px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:1.2rem;flex-shrink:0}
.ov-title{font-size:.95rem;font-weight:700}
.ov-cnt{display:inline-block;font-size:.7rem;padding:.12rem .5rem;border-radius:7px;margin-top:.18rem;font-weight:700}
.ov-desc{font-size:.78rem;color:#888;padding:0 1.1rem .7rem;line-height:1.6}
.ov-kwrap{display:flex;flex-wrap:wrap;gap:.3rem;padding:.5rem 1.1rem .8rem}
.okw{font-size:.7rem;padding:.18rem .5rem;border-radius:5px}
.ov-avs{padding:.6rem 1rem .9rem;border-top:1px solid #1e1e28;display:flex;flex-wrap:wrap;gap:.3rem;align-items:center}
.mini-av{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.62rem;font-weight:700;flex-shrink:0;cursor:default}
.av-e{background:#2a2444;color:#b4a8ff}
.av-y{background:#073d30;color:#4fffd4}

/* ===== GROUP DETAIL ===== */
.gd-top{display:flex;flex-wrap:wrap;gap:.5rem;margin-bottom:1.25rem;align-items:center}
.gb{background:#111117;border:1px solid #1e1e28;border-radius:18px;padding:.35rem .85rem;font-size:.78rem;color:#555;cursor:pointer;transition:all .15s;white-space:nowrap}
.gb:hover{border-color:#444;color:#ccc}
.gb.on{font-weight:700;border-color:transparent}
.sw{flex:1;min-width:160px;position:relative}
.sw input{width:100%;background:#111117;border:1px solid #1e1e28;border-radius:8px;padding:.42rem .75rem .42rem 2rem;color:#f0ede8;font-size:.83rem;outline:none}
.sw input:focus{border-color:#e8ff00}
.sw::before{content:'🔍';position:absolute;left:.6rem;top:.42rem;font-size:.75rem;pointer-events:none}
.gd-count{font-size:.75rem;color:#444;margin-left:auto}

.gsec{margin-bottom:2.5rem}
.ghd{display:flex;align-items:center;gap:.6rem;padding:.8rem 1rem;border-radius:9px;margin-bottom:.85rem}
.g-icon{font-size:1.1rem}
.g-title{font-size:.92rem;font-weight:700}
.g-cnt{font-size:.7rem;padding:.12rem .5rem;border-radius:6px;font-weight:700}
.g-desc{font-size:.75rem;color:rgba(255,255,255,.4);margin-left:.25rem}
.mgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:.7rem}
.mc{background:#111117;border:1px solid #1e1e28;border-radius:9px;padding:.8rem .9rem;cursor:pointer;transition:border-color .15s,transform .1s}
.mc:hover{transform:translateY(-1px)}
.mc-top{display:flex;align-items:center;gap:.55rem;margin-bottom:.45rem}
.mav{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.78rem;font-weight:700;flex-shrink:0}
.mname{font-size:.85rem;font-weight:700;line-height:1.25}
.mcat{font-size:.65rem;padding:.1rem .42rem;border-radius:5px;margin-top:.1rem;display:inline-block}
.mval{font-size:.76rem;color:#999;line-height:1.55;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;margin-bottom:.35rem}
.mtags{display:flex;flex-wrap:wrap;gap:.22rem}
.mtag{font-size:.63rem;padding:.1rem .38rem;border-radius:4px}

/* ===== WORDMAP ===== */
.wm-h2{font-size:.7rem;letter-spacing:.12em;color:#e8ff00;text-transform:uppercase;font-weight:700;margin-bottom:1rem}
.wordcloud{display:flex;flex-wrap:wrap;gap:.45rem;align-items:center;line-height:1;padding:.4rem 0 1.5rem}
.ww{cursor:pointer;border-radius:6px;padding:.28rem .6rem;transition:filter .1s}
.ww:hover{filter:brightness(1.3)}
.rank-list{display:flex;flex-direction:column;gap:.35rem}
.rrow{display:flex;align-items:center;gap:.65rem;padding:.28rem .4rem;border-radius:5px;cursor:default}
.rrow:hover{background:#16161e}
.rw{font-size:.8rem;min-width:95px;flex-shrink:0}
.rbar{flex:1;height:11px;background:#1a1a22;border-radius:3px;overflow:hidden}
.rfill{height:100%;border-radius:3px}
.rnum{font-size:.7rem;color:#444;min-width:64px;text-align:right}

/* ===== MODAL ===== */
.mbg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:400;overflow-y:auto;padding:2rem 1rem}
.mbg.on{display:flex;align-items:flex-start;justify-content:center}
.mdl{background:#111117;border:1px solid #2a2a38;border-radius:15px;width:100%;max-width:700px;margin:auto;position:relative;overflow:hidden}
.mx{position:absolute;top:.85rem;right:.85rem;background:#1e1e28;border:1px solid #2a2a38;border-radius:50%;width:29px;height:29px;color:#888;font-size:1rem;cursor:pointer;display:flex;align-items:center;justify-content:center;z-index:1}
.mhd{padding:1.4rem 1.6rem 1rem;border-bottom:1px solid #1e1e28;display:flex;align-items:center;gap:.85rem}
.m-av{width:48px;height:48px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.05rem;font-weight:700;flex-shrink:0}
.m-name{font-size:1.15rem;font-weight:700}
.m-theme{font-size:.72rem;padding:.16rem .6rem;border-radius:7px;display:inline-block;margin-top:.2rem}
.mbody{padding:1.2rem 1.6rem 1.8rem;max-height:75vh;overflow-y:auto}
.ms{margin-bottom:1.15rem}
.ms-lbl{font-size:.66rem;letter-spacing:.1em;color:#e8ff00;text-transform:uppercase;font-weight:700;margin-bottom:.35rem}
.ms-txt{font-size:.86rem;color:#ccc;line-height:1.75;white-space:pre-wrap}
.vgd{display:grid;grid-template-columns:1fr 1fr;gap:.5rem}
.vi{background:#0b0b0e;border:1px solid #1e1e28;border-radius:7px;padding:.58rem .7rem}
.vi-l{font-size:.64rem;color:#444;margin-bottom:.18rem}
.vi-t{font-size:.78rem;color:#bbb;line-height:1.6;white-space:pre-wrap}
.tag-row{display:flex;flex-wrap:wrap;gap:.25rem}
.tg{font-size:.68rem;padding:.16rem .48rem;border-radius:5px;margin-bottom:.1rem}
.no-r{grid-column:1/-1;padding:2.5rem;text-align:center;color:#333}

/* ===== SUMMARY ===== */
.sum-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:.9rem;margin-bottom:2rem}
.sum-card{background:#111117;border:1px solid #1e1e28;border-radius:11px;overflow:hidden;cursor:pointer;transition:border-color .15s,transform .12s}
.sum-card:hover{transform:translateY(-1px);border-color:#333}
.sum-card.loading{border-color:#e8ff0044}
.sum-card.done{border-color:#1e1e28}
.sc-head{display:flex;align-items:center;gap:.6rem;padding:.85rem 1rem .6rem}
.sc-num{width:28px;height:28px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:.75rem;font-weight:700;flex-shrink:0;background:#1e1e28;color:#666}
.sc-label{font-size:.88rem;font-weight:700;color:#f0ede8}
.sc-cnt{font-size:.68rem;color:#555;margin-left:auto}
.sc-body{padding:0 1rem .9rem;min-height:80px}
.sc-placeholder{font-size:.78rem;color:#333;padding:.5rem 0}
.sc-summary{font-size:.82rem;color:#bbb;line-height:1.7}
.sc-keywords{display:flex;flex-wrap:wrap;gap:.3rem;margin-top:.6rem}
.sc-kw{font-size:.7rem;padding:.18rem .5rem;border-radius:5px;background:#1e1e28;color:#888;border:1px solid #2a2a38}
.sc-loading{display:flex;align-items:center;gap:.5rem;padding:.5rem 0}
.sc-loading span{font-size:.78rem;color:#555}
.spin{width:14px;height:14px;border:2px solid #333;border-top-color:#e8ff00;border-radius:50%;animation:spin .7s linear infinite;flex-shrink:0}
@keyframes spin{to{transform:rotate(360deg)}}
.sum-all-btn{display:flex;gap:.75rem;margin-bottom:1.5rem;flex-wrap:wrap;align-items:center}
.sa-btn{background:#111117;border:1px solid #1e1e28;border-radius:8px;padding:.45rem 1rem;font-size:.82rem;color:#888;cursor:pointer;transition:all .15s}
.sa-btn:hover{border-color:#e8ff00;color:#e8ff00}
.sa-btn.primary{background:#e8ff001a;border-color:#e8ff00;color:#e8ff00;font-weight:700}
.sum-detail{background:#111117;border:1px solid #1e1e28;border-radius:12px;padding:1.5rem;margin-top:1.5rem;display:none}
.sum-detail.on{display:block}
.sd-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem}
.sd-title{font-size:1rem;font-weight:700;color:#f0ede8}
.sd-close{background:#1e1e28;border:1px solid #2a2a38;border-radius:6px;padding:.3rem .7rem;font-size:.78rem;color:#888;cursor:pointer}
.sd-summary{font-size:.87rem;color:#ccc;line-height:1.8;margin-bottom:1.2rem;white-space:pre-wrap}
.sd-answers{display:flex;flex-direction:column;gap:.5rem;max-height:420px;overflow-y:auto}
.sd-ans{background:#0b0b0e;border:1px solid #1e1e28;border-radius:7px;padding:.65rem .8rem}
.sd-ans-name{font-size:.7rem;color:#555;margin-bottom:.25rem}
.sd-ans-text{font-size:.82rem;color:#bbb;line-height:1.6;white-space:pre-wrap}
</style>
</head>
<body>
<div class="hd">
  <h1>NEO ACADEMIA <em>3期生</em> — ビジョン別グループ分析</h1>
  <p>全76名を5テーマに分類 ｜ キーワードランキング・個人詳細（全文）つき</p>
</div>
<div class="tabs">

<div class="tab" data-tab="sum">📊 設問別サマリー</div>

  </div>
</div>
<script>
const RAW={"themes":[{"id":"challenge","icon":"🔥","title":"挑戦・行動派","color":"#FF6B35","desc":"「まずやってみる」「失敗を恐れない」を軸に、一歩踏み出すことを何より大切にする","members":[{"name":"西岡恭侑","category":"ユース選抜","values":"楽しむ心を持って未知のものや考え方の違う人、苦しいことなどにも挑戦する自分でありたい。","impact":"人々の交流を活発にし、楽しい場をつくりたい。\n皆の無駄な遠慮をなくし、すれ違いをなくし、新たな価値を作りたい。","vision_a":"もっと関わりを増やし深くし楽しい場を作りたい","vision_b":"人と関わることを思い出して交流、リアルの楽しい場を作りたい。","vision_c":"東京や大阪に遅れをとらない、西日本の東京と言われるぐらい、経済、にぎわい、楽しさ幸せで溢れるいい街にしたい。","vision_d":"冷笑や遠慮多く関わりの少ない冷めきった日本から、人と関わり深く助け合って賑やかで楽しい幸せの溢れた日本にしたい。","vision_e":"戦争や環境汚染などのない、幸せで、未来のある少しでも1人でも幸せな人が多い未来にしたい。","growth":"誰かに、お客様に、何かの価値を提供出来る自分のスキル、市場価値、武器をつけたい。自分のやりたいことをどう実行に移して、どう実現するか、また自分のやりたいことをして、誰かに、地域にとっても価値のあるものを提供出来る自分になりたい。行動、挑戦できる自分になりたい。","future_self":"人と一緒にやりたいことに対して取り組み、やり遂げる力。色んな考え方、知識をつけて、物事の考え方を広げたい。色んな視線で物事を考えれるようになりたい。","challenges":"自分と考え方が違う人といっぱい話したい。同じ想いを持った仲間とその実現に取り組む経験をしたい。","insights":"みんな違う想い、信念でやりたいことを持ち、誰か、地域のために何かをしたい素敵な人がいっぱいいて、そんな人達と何かに取り組める貴重な環境だと思いました。","tags":["挑戦・行動","地域・福岡","成長・スキル","共創・つながり","笑顔・ポジティブ"]},{"name":"苅北沙絢","category":"ユース選抜","values":"常に楽しむ気持ちを持って、周りを巻き込んで楽しめる\n躊躇せず、どんなことにも勇気を持って挑戦できる","impact":"自分の明るさで、周りの人も一緒に明るく、楽しく、前向きにしたい\n意見を出し合いやすい環境を作る","vision_a":"挑戦する人・向上心のある人が増える","vision_b":"地域の交流やイベントを増やし、外に出る人や人とのつながりを増やすことで、幸せを感じる人が多い、明るく活気のある地域","vision_c":"国内外の人が集まりやすく、誰にとっても居心地の良い地域","vision_d":"日本の良さを大切にしながら、その魅力を求めて世界中から多くの人が訪れやすい国","vision_e":"困っている国や人を支え合える世界\n誰もが安心して暮らし、自分らしく生きられる平和な世界","growth":"恥ずかしがらず、どんな場でも自分の意見を持ち、伝えられる\n将来の目標、目的を明確化する\n現代において、働く時に強みになる専門スキルを身に付ける","future_self":"自分の将来の明確な目標を持つ\nすごいで終わらず自分も参加できる\n人に流されず自分の軸を持つ\n自分が人にどんな影響を与えられるのか見つける","challenges":"自分の行動で人を喜ばせる\n自分にはない考え方や価値観を持つ人と交流する\n海外に興味を持つ人や実際に海外経験のある人と交流する","insights":"","tags":["挑戦・行動","地域・福岡","人を巻き込む","成長・スキル","共創・つながり","笑顔・ポジティブ","平和・世界"]},{"name":"小場川千花子","category":"ユース選抜","values":"挑戦を恐れずに楽しめる自分でありたい。","impact":"周りの人が少しの幸せを感じられるような影響を与えたい","vision_a":"自ら生み出す力をつけたい。先生達が用意してくれるものだけじゃなくて生徒主体で動けるとよさそう。","vision_b":"東京に住みたい！の福岡版が増えるといいなって思いました。","vision_c":"今も、福岡の熱量はすさまじいけど、大学生だけじゃなくて、もっと中高生とかを巻き込めると面白そう。","vision_d":"いろんな場所で、自分の「やってみたい」を形にできる環境があると面白そう。","vision_e":"福岡を中心に、世界のトレンドを生み出せたら面白そうだと思った。","growth":"質問上手になりたいです。\nパソコンスキルを上げたいです。\nレスポンス力を上げたいです。","future_self":"目の前にあるものを面白がれる私になりたい。\nやろうか悩んでいる人の背中を押せるようになりたい。","challenges":"なにか一つでもいいから、全力でやり切ってみる。\nたくさんの人のお話を聞いてそのことについてちゃんと対話してみたい。\n本気で人とぶつかってみたい。","insights":"一人ひとり、思い描いてるものは違うし、考え方も違って、自分の中で新しい気づきを得れてとっても楽しかった。グループで話してると、その人たちからの熱量がすごくて、私も頑張らないとって思いました。","tags":["挑戦・行動","地域・福岡","人を巻き込む","成長・スキル","笑顔・ポジティブ","平和・世界"]},{"name":"三坪煌","category":"ユース選抜","values":"周囲との調和を保ちつつ新鮮味を求め続ける自分でありたい。","impact":"不安や迷いがあっても、一歩踏み出してみようと思えるような影響を与えたい。","vision_a":"主体的に動き、恐さと向き合える人が増えたらいいと思う。","vision_b":"学生と地域の企業がもっと気軽につながることができたらいいと思う。","vision_c":"ものづくりに関わりたいと思う学生がもっと増えたらいいと思う。","vision_d":"製造業やインフラを支える仕事が正しく評価され、若い世代に選ばれる社会になったらいいと思う。","vision_e":"Made in Japanが、これからも世界で信頼され評価される時代であればいいと思う。","growth":"・リーダーとして、周りと目的を常に共有しながら前に進めるようになる\n・目的遂行のために巻き込めるものを最大限巻き込めるようになる","future_self":"・自分の考えを、自分の言葉で説明できる人\n・周りと目的を共有しながら前に進める人\n・企業や大学の方に信頼して任せてもらえる人\n・単発で終わらず、続く取り組みを形にできる人","challenges":"・事業を続けている経営者の考え方を学ぶ\n・ものづくり企業の現場を見る\n・企画から集客、運営までやり切る\n・率直に指摘してくれる大人や、本気の仲間と出会う","insights":"","tags":["挑戦・行動","地域・福岡","人を巻き込む","社会貢献","ビジネス・起業","平和・世界"]},{"name":"井手壱彩","category":"ユース選抜","values":"夢を見るきっかけをつくり、夢に向かう事を最初から叶わないと考える事を壊し、夢を語り行動する人を増やせる自分でありたい","impact":"やりたいことを言葉にし、実際に行動に移す人を増やしたい","vision_a":"やりたいことを言葉にし、挑戦できる環境をつくる","vision_b":"やりたいことを語り合い、挑戦する人が増える地域にする","vision_c":"やりたいことを語り挑戦する人が集まり、その価値観を発信する拠点として福岡をつくる","vision_d":"やりたいことを語ることが評価され、挑戦する人に機会が集まる社会を日本に広げる","vision_e":"やりたいことを語ることで仲間や機会が世界中でつながり、挑戦が当たり前にできる社会をつくる。","growth":"これまでの行動経験をもとに、人の心が動く環境の中で、他者の行動を生み出す力を身につけるとともに、その要因を分析できる力を高めたいです。","future_self":"やりたいを言葉にし行動し続けながら、他者の行動も生み出し、それを再現できる教育者でありたい。","challenges":" 挑戦したいこと\n人の「やりたい」を引き出し、行動につなげる企画の実行\n\n経験したいこと\n人の心が動く瞬間を体感し、その要因を分析する経験\n\n出会いたい人\n 人の行動を生み出している実践者","insights":"似たような考えを持つ人、全く違う考えを持つ人がいて面白かったです。僕の抽象的な表現を経緯から考える機会となり、アウトプットすればするほど自己理解が深まりました。","tags":["挑戦・行動","地域・福岡","社会貢献","共創・つながり","子ども・教育","言語化・発信","平和・世界"]},{"name":"大宅花奈","category":"ユース選抜","values":"何かをやるとき、目的や目指す目標を明確にしてから始める。\n目標が定まらないままやらない。\n目指す目標が決まっていると、強い軸があるから少しの挫折で辞めたり向き合うことから逃げたりしないから。","impact":"・課題や抜け落ちたタスクに気づいて行動できるという点を見て、自分にもできるかもしれないと勇気を与えて切磋琢磨して相乗効果を生み出したい。","vision_a":"世の中に落ちているたくさんのチャンスをもっと貪欲に手に入れること。","vision_b":"もっと治安がよくなってほしい涙（規範意識）","vision_c":"福岡が自然も都会も充実していて素敵な都市だからといって今の環境に満足することなく、福岡の環境を今見ている切り口とは異なる切り口で見たり、他の環境にチャレンジしたりともっと刺激的な環境をより多くの人が追い求めること。","vision_d":"・日本のいいところを将来に継承していく。\n・極端な排外主義は辞める\n↑在日外国人は全員悪、などの思想","vision_e":"他人と価値観、文化が違うことは当たり前なので、それを戦争につなげることなくいい感じに折衷すること。","growth":"プロジェクトを成功させ、福岡の若者にいい影響を与えるための過程で、「他者貢献」や「リーダーシップ」に対する解像度をもっと上げたい。","future_self":"・今以上に将来なりたい理想像のより明確な言語化、NEOで一年間頑張ったという実績に満足することなく自分や社会課題と向き合い続けられる自分になりたい。\n・相手に自分の考えをわかりやすく伝えるスキルや、たくさんのタスクを心身共に健康にこなせるようにセルフマネジメントができるようになりたい。\n・初対面の人とももっと仲良く話せるようになりたい。（特に超年上の人）","challenges":"・自分とは違ういろいろなバックグラウンドを持つ人とたくさん話して、価値観のアップデートをしつづけたい。\n・人見知りの心を捨てて、いろんな人に話しかける！","insights":"メンバーそれぞれが全く違う切り口でビジョンや大切にしたい価値観を持っていておもしろかった。全員の価値観に触れたい。","tags":["挑戦・行動","地域・福岡","人を巻き込む","社会貢献","成長・スキル","子ども・教育","言語化・発信","リーダーシップ"]},{"name":"堀口真大朗","category":"ユース選抜","values":"新しいことに対して積極的に知る、考える中で、人のことを尊重しつつ、自分の知らない自分を知ろうとする自分でありたいです。また、楽観主義で誠実で幸せでいたいです。","impact":"周りの人が気分を害しないような環境を作り、自分がたくさん話すことで幸せのようなものを感じさせたい。また、自分は他の人とは違った考え方ができる自信があるので、周りに違った視点を提供することで、刺激を与えたいです。","vision_a":"もっと意欲的に発言できる場と人が欲しい","vision_b":"地域の全てに何かしらのコネクチョンがあり、互いを助け合えること","vision_c":"企業間だけでなく地域の方々と関わり、意見を傾聴すること","vision_d":"人々が一つの目標に対して支えたり、引っ張っていける存在がたくさんいること","vision_e":"人と人が互いを尊重し、争いがないこと","growth":"人と話すことが当たり前になりたい\n後悔する自分にならないために挑戦心を持ち続ける\n人と出会う中で自分を深め、今までの偏見を変えて価値観を発展させたい","future_self":"人前で発言できるのが当たり前\n人を考えた行動ができる\nFIRSTペンギンやパイオニアになりたい","challenges":"多様な経験を持っている人と話したい\n企業の方々に質問したい\nチームとなって課題解決を行うこと\n自分について話せるようになりたい","insights":"意外とみんながしたいことで何かしら似ているところがあったこと。","tags":["挑戦・行動","地域・福岡","人を巻き込む","笑顔・ポジティブ"]},{"name":"前山 奈央","category":"企業選抜","values":"私が大切にしている価値観は、誠実さ、挑戦、そして人に価値を返すことです。\n目の前の結果だけではなく、その先にいるお客様や仲間、地域にとって本当に意味のあることかを考えながら行動したいと思っています。\n\n仕事では数字を見て判断することを大切にしていますが、同時に、数字の奥にある人の感情や背景も見落とさない自分でありたいです。\n成果を出すだけでなく、周りから「一緒にいると前向きになれる」「信頼できる」と思ってもらえるような存在でいたいです。","impact":"私は、自分の強みである課題を整理する力、改善を積み重ねる力、最後までやり切る力を発揮して、周りに前向きな影響を与えたいです。\n\n具体的には、\n「なんとなく無理そう」を「やればできそう」に変える空気をつくりたいです。\nまた、感覚だけではなく、事実と対話をもとに前に進めるチームづくりを通して、周囲の人が自分の可能性を信じて挑戦できる状態を増やしたいと思っています。\n\n私自身が挑戦し続けることで、周りにも「変化を恐れず、一歩踏み出していいんだ」と感じてもらえる存在になりたいです。","vision_a":"会社や身近な関係性においては、一人ひとりの強みが活き、率直に意見を言い合え、同じ方向を向いて前に進める関係性をつくりたいです。\n\nただ業務を回すだけではなく、\n「この仕事は誰のためにあるのか」\n「自分たちはどんな価値を届けたいのか」\nを共有しながら働ける組織が理想です。\n\nまた、家庭においても、安心して挑戦できる土台を大切にしたいです。\n仕事も家庭もどちらかを犠牲にするのではなく、互いに良い影響を与え合える関係性を築いていきたいと思っています。","vision_b":"私が思う福岡市の良さは、都市でありながら自然が近く、しかも人が挑戦しやすい空気があることです。\nだから私は、福岡市がただ便利で住みやすい街ではなく、「やってみたい」と思った人が一歩踏み出せる街であってほしいと思っています。\n\n都心のスピード感と、海や山が近い余白の両方があるからこそ、福岡市には人の発想を前向きにする力があると感じます。\n私はそんな福岡市で、挑戦する人がちゃんと応援されて、挑戦が次の挑戦を生む地域になってほしいです。","vision_c":"福岡の食文化を「旅行先で味わう名物」ではなく、「家庭で続いていく文化」として広げていくことです。\n\n明太子やもつ鍋のような福岡の味には、おいしさだけではなく、人が集まる空気や、食卓が少し明るくなる力があると思っています。\n私はそれを体験価値として届けたいです。県外の方に福岡のファンになってもらい、日々の食卓の中で自然に福岡らしさを感じてもらえる。そんな広がり方ができる福岡県にしていきたいです。\nそして、次の世代にも「福岡の味っていいよね」と自然に受け継がれていく流れを、自分の仕事を通じてつくっていきたいです。","vision_d":"日本は、丁寧さや品質、思いやり、現場力といった強みを持つ国だと思います。\n一方で、変化を恐れたり、前例に縛られたりする場面も少なくありません。\n\nだからこそ、私が描く日本のビジョンは、\n日本らしい強みを大切にしながら、挑戦や変化を歓迎できる国です。\n\n年齢や肩書、立場に関係なく、\n「やってみたい」\n「社会をよくしたい」\nという思いを形にできる機会がもっと増えてほしいです。\n\n守るべきものを守りながらも、新しい挑戦が当たり前に生まれる日本であってほしいと思います。","vision_e":"世界に対しては、違いを分断ではなく価値として受け止め合える状態を理想としています。\n\n国や文化、立場が違っても、互いを知ろうとし、尊重し合いながら共通の課題に向き合える世界であってほしいです。\nその中で、食や文化、仕事を通じて、人と人がつながる接点はとても大きいと思っています。\n\n私は、世界規模の大きなことを一気に変えるというより、まずは自分の関わる仕事や人との関係の中で、信頼や価値の循環を生み出していきたいです。\nその積み重ねが、より良い世界につながると考えています。","growth":"NEO ACADEMIAを通じて、私は視座を上げる成長をしたいです。\n\nこれまでは、ECやマーケティングの現場で、数字を見ながら改善を積み重ねることに力を注いできました。\n今後はそこに加えて、\n\n自分の想いを言語化する力\n人を巻き込む力\n社会や地域とのつながりの中で価値を構想する力\nを伸ばしたいと思っています。\nまた、正解を探すだけでなく、自分なりの問いを持ち、ビジョンを語れる人間になりたいです。\n実務家としての強さに加えて、未来をつくる側の視点を持てるよう成長したいです。","future_self":"私は、目先の成果だけでなく、長い目で価値をつくれる人になっていたいです。\n\n気持ちとしては、焦りや不安に振り回されず、落ち着いて本質を見られる自分でいたいです。\n考え方としては、他責ではなく自責で物事を捉え、変えられることにエネルギーを使える人でいたいです。\n発言としては、遠慮しすぎず、でも独りよがりでもなく、相手や場に価値を生む言葉を届けられるようになりたいです。\n行動としては、思ったことをただ考えるだけで終わらせず、まず一歩を踏み出し、やりながら改善できる自分でありたいです。\n\n能力面では、マーケティングやECの専門性に加えて、事業視点、組織視点、地域視点を持ち、より大きな価値を設計できるようになりたいです。","challenges":"・自分のビジョンや想いを、人に伝わる言葉で話す挑戦\n・会社や地域の未来について、普段の業務を超えた視点で考える経験\n・自分とは異なる業界・立場・価値観を持つ人との対話\n・すでに地域で挑戦している実践者との出会い\n・事業づくりや地域づくりを本気で進めているリーダーとの出会い\n・自分の固定観念を壊されるような経験\n・小さくてもいいので、自分発信で何かを形にする挑戦\n・仲間と本音で話し、互いに刺激し合える関係づくり\n・マーケティングやECの枠を超えて、社会や地域課題に触れる経験\n・行動量だけでなく、視座や器を広げる学び\n・将来的に一緒に何かを仕掛けられる仲間との出会い","insights":"今回は体調不良で休んでしまったため、グループでのビジョン共有には参加できず、気づきを得る機会がありませんでした。\n次回以降は、他の方の考えや価値観にも触れながら、自分自身のビジョンをより深めていきたいです。","tags":["挑戦・行動","地域・福岡","人を巻き込む","社会貢献","成長・スキル","共創・つながり","笑顔・ポジティブ","ビジネス・起業","言語化・発信","平和・世界"]},{"name":"相良七海","category":"ユース選抜","values":"挑戦を面白がり、何事にも臆せずチャレンジし続ける自分でありたいです。","impact":"周りの人を巻き込んで、一緒に楽しみながら苦難を乗り越えられるような共創的な影響を与えたいです。","vision_a":"何事も相談して助け合って、苦難を乗り越えるような関係","vision_b":"互いに助け合い、寄り添う間柄","vision_c":"強みを生かしつつ、新たなことにチャレンジし続ける人を応援してくれるところ","vision_d":"移り変わり続ける世界で持続可能な社会を目指して努力し続ける国","vision_e":"多くの国が友好的な関係を構築し、平和を築く","growth":"・多くの人を巻き込んで、何かを成し遂げられるような人間になりたい\n・戦略を立てて企画を立ち上げ、目的を達成できるようになりたい\n・プロジェクトを通して経営力を身につけたい","future_self":"・周りの人に自分の思いや考えをすぐに言語化してわかりやすく伝えられるような自分になっていたい\n・何に対しても自信をもって取り組めるような自分になりたい","challenges":"・自分の改善ポイントを見つけて伝えてくれる人\n・自分の当たり前を塗り替えられるような経験をしたい\n","insights":"","tags":["挑戦・行動","人を巻き込む","社会貢献","共創・つながり","言語化・発信","平和・世界"]},{"name":"中山一樹","category":"企業選抜","values":"自分の考えを持って、周囲と協力・連携して行動を行っていく自分。","impact":"自然と周囲の人が動きやすいような影響を与える（場作りをする）こと","vision_a":"発言や議論がより活発化する","vision_b":"地域活動が盛ん","vision_c":"色んな企業がNEO福岡や他の企業のいい所を吸収してさらにより良い会社が増える","vision_d":"県を跨いで、色んな会社同士の交流が仕事面に限らず盛んに行われている","vision_e":"明るく平和","growth":"「やってみる」をマインドにして、それをBe playfulへ成長させる","future_self":"周囲と協力して、周囲を巻き込んで実行する","challenges":"自分の経験のない領域で新しい発見やアイディアを見つけていくこと","insights":"","tags":["挑戦・行動","地域・福岡","人を巻き込む","成長・スキル","共創・つながり","笑顔・ポジティブ","平和・世界"]},{"name":"山下　直矢(ヒューベストホールディング株式会社)","category":"企業選抜","values":"①自身が現時点で興味のあること、ないことを問わず、前向きに挑戦し、1だったものを100にできるようにする！\n→私はこれまで何事も挑戦、できないことを考える時間があったら突っ走ってきた人間です。その中で生まれた課題に対しても前向きに捉え成長できるチャンスと捉えるようにしています。自身の力だけでなく周りの力を借りながら、引き出しをいただきながら自身の成長に繋げてきたらからこそ、ネオでの活動を通して何事にも前向きに取り組んでいきたいと強く感じています！\n\n②チームでやり切る中で、一人一人と真剣に向き合い良い方向へ巻き込める自分でありたい\n→これから行うプロジェクトの中で、決して全てがうまくいくとは思っていません。その中で意見の相違もあると思います。その中で私が率先して仲間の声に耳を傾けて、まずは一人一人の価値観、考えに寄り添っていきたいと考えています。その際に見つけたそれぞれの価値観・個性を大事にしながら、チームがより良いプロジェクトができるように円滑な進行を行ってきたいと感じています。\n\n③私の強み、弱みを恥ずかしがらず共有して強みを最大限伸ばし、弱みは前向き精神を持って克服できる自分でありたい\n→私の良いところは弱い部分も恥ずかしがらずさらけ出せることだと思います。誰しもが強み弱みがある中で仮に弱みを1人で抱え込んで物事を進めるとストレスになる人もいるんじゃないかと考えています。お互いの強みと弱みを理解し合い、強いところを伸ばしあえたら互いの成長にも繋がると思います。反対に弱いところもカバーし合い、その中で得た経験を今後に活かせると考え、私は班員の理解者になりたいと考えています。","impact":"①私の行動・言動で周りの人を笑顔にし、幸せにしたい！\n→私が生きる中で人を喜ばせたい、幸せにしたいは1番大事にしていることです。今後取り組むプロジェクトの中でもメンバーをはじめ、プロジェクトに携わる方々をどのように喜ばせるかを考えていきたいと強く感じています。私はどの環境下においてもムードメーカーになることが多く、その良さを発揮しながら、互いに喜びや達成感を共有していきたいと感じました。\n\n②失敗を恐れず何事もまずはやってみる！\n→私は失敗を恐れずとことん突き進むことを大事にしています。その中で失敗することや理論性に欠けるところもありますが、そこを含めて失敗を発見したらそれを克服することを重要視して成長に繋げています。何か成果を残す為にまずはやってみる→失敗を発見する→失敗を克服し成長・成功に繋がることを大事にし、挑戦を怖がる周りの方がいたら優しく背中を押してあげられるような人間になっていきたいと感じています。\n\n③何事もポジティブ変換！\n元々学生時代の時までネガティブに物事を考えることも多かったですが、それを踏まえてネガティブに考えてスッキリとした結果を得られたことがなく、何事もポジティブに捉えるようにしています。周りがネガティブに思っていることもそこを楽しめることが私の強みである為、その価値観は今後ネオで成長するために重要になると思うので、班員に伝染させていきたいと思います。","vision_a":"私が思う会社のビジョンは各事業が九州全域に広がり、自社の理念にも掲げている『幸せのご縁を広げる』のように関わる全ての人に喜びを与えれる会社として広がっていけたらと強く感じています。\nその為に若手社員がよりイキイキと働ける環境の創出、チャレンジ精神を持つ社員が増えていけばいいなと思います。ヒューベストで働くことが楽しい、こうなりたいと夢を描く社員が増え、そこまでにひたむきに取り組める組織になっていくことで更に強い組織を作ることができると思います。\n私たちは売上や社員数が増え、会社が大きくなっているからこそ、まだまだたくさんの問題に直面することもありますが、上司がなんとかしてくれると受け身にはならず、自分達が声を上げて変えれるような若手がどんどん活躍できる会社になったら良いと思います。","vision_b":"地域のビジョンとして佐賀県について考えてみました！\n佐賀のビジョンとしては福岡のように若者が集まり、魅力ある企業が創出できたらと考えました。\n佐賀県出身者の多くは大学進学や就職を機に県外に出る若者が多いと感じます。大学・企業数が少ないことも挙げられますが、魅力があり、若いうちから活躍できる環境がない企業が多いのかなと推測しました。人事の仕事をしていて、学生の声を聞くと佐賀だったら公務員と思っている学生も多いのですが、人口が減っている今自治体の収入も減る為、決して公務員が安定とも思いません。その為に佐賀にもっと若者が活躍できる環境・魅力ある企業を増やしていかなければなりません。私自身が長崎出身で福岡就職を希望してましたが、ヒューベストという佐賀を拠点とする企業に入社したのも事業内容の面白さ、チャレンジできる環境があったからこそ魅力に感じました。そういった事業を私の力でも創造していきたいと考えています。","vision_c":"福岡全体として魅力ある企業・人財が集い、日本を引っ張れる都市になれたら良いなと感じています。福岡は九州内でも発展してきていますが、それと同時に福岡市内と郊外での地域間格差も挙げられと同時に郊外の経済・生活の豊かさに力を入れることで福岡県自体が豊かになるのではないかと考えています。\n私は福岡県に住みはじめてまだ半年も経っていませんが、それでも若者にとって福岡は魅力ある都市であるからこそ、福岡市内にのみ目が止まるのではなく、福岡県全体として新たな事業・取り組みを行い人が集い、活発になれたら良いなと思います。\n私はまだ福岡に詳しくないので、浅いことしか書けませんでしたが、これからネオアカデミアの体験を通して、課題理解を深めながら、全力でワークに取り組みたいと強く考えています。","vision_d":"若者が社会に対してもっと関心を寄せて、活発で積極性を持てる社会になったら良いと感じています。その背景として、三木校長もおっしゃっていた企業の多くのトップは50代以上で若手でそこを継げる人が不足していることが挙げられます。そこに関して弊社に目をやると、ヒューベストは平均年齢的にも若い会社ではありますが、30代〜40代がお店の店長、事業責任者を担っている状態で、そのポジションをしたいといった若手社員が少ないと私は感じてきました。選挙でも、若年層よりも高齢層の方が関心が高く選挙に行かない若者も多いこともよく聞きます。\n次第に若者が少なくなっていく日本に対して、社会に関心が少ないのは大きな問題であると考え、私も企業社会にもっと関心を持ち、貢献できるようになりたいと考えていますし、そういった若者が増えたら良いなと思います。\n人口減少は簡単に止められることではありませんが、私たち若者が新たな答えを創造していき、トップとして走っていければ日本の経済、生活を豊かにできると思いました。","vision_e":"子供がすくすくと育ち、安心できる環境下で勉強や遊ぶことができ、その子供たちが大きくなり世界が発展しく礎になればいいなと思っています。\n私は長崎出身ということで、小さい頃から今日まで原爆や世界で起こる紛争、それによる被害について学習をしてきました。その実態を知る中で、当たり前のことが当たり前ではないことに気づき今の環境にとても感謝をできるようになりました。\n近年ではアフリカを中心に人口が増えていき、それと同時に食料問題や教育格差も深刻化しているからこそ、私たちが自国で満足するのではなく、安心できる場所や技術を提供できていければ良いと強く感じています。\n大学時代、少しではありますが募金活動などのボランティア活動も経験してきました。現地には行かなくても、できることは身の回りにたくさんあると考え、行動できれば良いなと思っています。","growth":"①チームで協働するマネジメント力を学びたい\n②リーダーとして周りのメンバーを引っ張っていく力(巻き込み力)\n③勝ち筋を描く力→ビジョン達成の為に課題に向き合い突破する為のアイデアを創造したい\n④今以上に失敗を恐れず、前向きに取り組むポジティブマインドを伸ばしたい","future_self":"①困難な課題や失敗に対しても前向きに捉え、どうしたらうまくいくのかを面白がりながら取り組む気持ちを養っていきたいです！\n②仲間と協力をし、チームとして何かを成し遂げる成功体験を積みたいです！その為にポジティブな捉え方をし、班員をポジティブにできる人間になりたいです！\n③直感型が良さでもありますが、加えて理論的に物事を捉え、冷静な判断ができる人間になりたいです！","challenges":"①これからのプロジェクトにおいてチームワークが求められると考え、なるべく早く班員と仲良くなり自身の固定概念ではなく、多くの価値観を吸収していきたい。\n\n②これから組織を引っ張れる立場、そして社員一人一人のマネジメントができるリーダーになりたいと考えている為、マネジメント経験がある人と出会いたい\n\n③経営者になりたいと現時点では思っていないからこそ、さまざまな経営者の方々の大事にしている思い、価値観を吸収して経営に対して興味を持ちたい！\n\n④企業の経営課題と向き合い、新たな事業戦略、改善案を創造できる経験を積みたい","insights":"グループでビジョンの共有をしてみて、新たにこういうビジョン設定があるのかと発見できた部分もあれば、班員の話を聞くことでこれからのネオで行うプロジェクトに対してのモチベーションが上がり刺激を受けました。周りの考えや思いを聞くことでモチベーションが上がる性格なので、より良いものになったと思います。","tags":["挑戦・行動","地域・福岡","人を巻き込む","社会貢献","成長・スキル","共創・つながり","子ども・教育","笑顔・ポジティブ","ビジネス・起業","平和・世界","リーダーシップ"]},{"name":"倉光志歩","category":"ユース選抜","values":"面白いと楽しいという想いを胸に挑戦し続けたい。\nまた人を嫌いになる理由は同調圧力に呑まれるから周りの環境や圧力に負けず自分の信じた考えの道を進む","impact":"周りにハッピーと新たな気づきを得られるような影響を与えられる人になりたい。","vision_a":"皆が自分のらしさを存分に発揮して、助け合える未来","vision_b":"地域の協力によって出来るわけのないの否定をしない想いを殺さない教育の未来","vision_c":"福岡の良いところ、学生がやりたいなりたい叶えたいを実現しやすい未来","vision_d":"何歳になっても叶えたい、変えたいの夢を実現、応援される前向きな日本の未来","vision_e":"挑戦する人を潰さない。共に創る世界の未来","growth":"周りを自分のやりたい事に巻き込むこと\n自分の言葉が相手に伝わる話し方になること\n計画したことやると決めたことは必ず行動に移すこと","future_self":"ハキハキ話せて、どんな相手とも対話ができる人","challenges":"自分のふわふわした考えを言語化して説明できる人\n福岡に埋もれているアーティストのアートイベントがやりたい。","insights":"","tags":["挑戦・行動","地域・福岡","人を巻き込む","子ども・教育","言語化・発信","平和・世界"]},{"name":"松井克之","category":"ユース選抜","values":"Amoreを持って、誰かの困りごとを解決できる自分でありたい。","impact":"誰もが住みやすい社会を創り、それぞれが自分のAmoreを持って欲しい。","vision_a":"自分を理解し、自信が持てるようになる。","vision_b":"自分の特性を活かすことができる場、挑戦しやすいが増える。","vision_c":"自分の特性を活かして、誰かの困りごとを解決できるようになる。","vision_d":"自分以外の存在を深く理解することで、受け入れ、尊敬できるようになる。","vision_e":"誰もが自分の夢や熱中できることを持つ。\nまた、他人を否定せず、受け入れ、尊敬する。","growth":"①他人の心を動かすデザインができる\n②多角的な視点から物事を見ることができる\n③限界な時でも笑顔","future_self":"①１つの考えに縛られない柔軟な発想ができる\n②チームに絶対必要な明るい存在","challenges":"・お笑い芸人\n・キャリアに携わっている人\n（自己理解をサポートしたり、挑戦の場を作っている人）","insights":"自分は「キャリア」の領域に強く興味があるのだと再認識できた。\nしかし、多角的な視点から物事を見る、アイデアを考えるという理想のためにキャリアに捉われず、幅広く事象や学問を見ていきたい。","tags":["挑戦・行動","社会貢献","笑顔・ポジティブ"]},{"name":"大原久弥","category":"企業選抜","values":"周囲への尊重を大切にして誠実に行動することで、信頼される自分でありたい。\n一方で、遊び心を忘れず、自分にとって未知の正解へどんどん飛び込んでいきたい。","impact":"「この人がいればどうにかなる」と、周囲に安心感を与えられるようになりたい。","vision_a":"一人ひとりが自分の役割や枠を飛び越えて行動できるような組織。","vision_b":"（久留米）福岡市に負けず、もっと人を呼び込めるような地域。","vision_c":"住んでいる人、訪れる人にとってもっと魅力的な地域。","vision_d":"自国の文化的な強み（八百万の神々、和、奥ゆかしさ、等々）を自覚し、これを武器に国際社会の中で成長する。","vision_e":"リソースを奪い合うばかりではなく、みんなで豊かになることに意識が向く世界。","growth":"・既存の枠組みにとらわれず、挑戦できる。\n・好奇心を持ち、もう一歩を踏み出せるようになる。\n・周囲の人を尊重して、目的達成のために巻き込める。","future_self":"・今よりも福岡のことを知り、福岡のことをもっと好きになる。\n・商売・仕事に対して、責任を持てるようになる。\n・声のトーン、発言のベクトルを上向きにする。","challenges":"・実務に即した、地に足のついたプロジェクトを完遂する。\n・会社の枠を超えたコミュニティを作る。\n・今後も心から目標にしたいような、魅力のある大人に出会う。\n・「自分ごと」として、当事者意識を持てるようになる。","insights":"","tags":["挑戦・行動","地域・福岡","人を巻き込む","社会貢献","成長・スキル","共創・つながり","平和・世界"]},{"name":"中村綾音","category":"ユース選抜","values":"誰に対しても愛を持って接し、身近な人も社会も幸せにできる自分でありたい。","impact":"みんなが自分らしく振る舞えることに貢献したい。目の前の人の自己実現に貢献したい。","vision_a":"思いつかない","vision_b":"糸島を、人が集まる刺激的な田舎にしたい。","vision_c":"思いつかない","vision_d":"文化や自然の豊かさを最大限に生かして繁栄し、心の豊かな国にしたい。","vision_e":"永遠に幸せな地球にしたい！\n(幸せな地球＝人間は、シンプルに生きているだけで、自分らしく振る舞え心地よさを感じられており、他の生き物や自然と調和している状態。)","growth":"•行動のハードルをゼロにしたい。\n•継続的に組織を動かせるようになりたい。(自分もメンバーも幸せで、かつ、組織の目的も果たせたいる状態をつくれるようになりたい)\n•壁にぶつかっても立ち向かい続けられるようになりたい。","future_self":"•事業や組織を動かけん人間として尊敬されている\n•視座が高くて、何でも受け入れられる、誰とでも協働できる","challenges":"•社会、社員、家族全てを幸せにしている社長と出会いたい。\n•社会人と協働したい\n•三木さん方が、世界をどのように捉えているか知りたい。\n•社会を動かす経験をしたい","insights":"","tags":["挑戦・行動","社会貢献","共創・つながり","笑顔・ポジティブ","ビジネス・起業","平和・世界"]},{"name":"池田えり","category":"企業選抜","values":"知らない事ややったことない事に対して興味を持って取り組める","impact":"私もやってみよう、と一歩踏み出す勇気を与える人","vision_a":"数値的な成果だけでなく頑張りを評価し合える","vision_b":"住んでいる人が地域の良いところを5つ言える","vision_c":"福岡市内以外の魅力が県外に知られている","vision_d":"想像がつかず記入できませんでした","vision_e":"自身の信条と他者の考えを区別して考えられる","growth":"ポジティブマインドを得る。他者を巻き込む力を身につける。","future_self":"失敗を恐れない、やってみよう精神\nこの人と一緒に頑張りたいと思ってもらえるように、自分自身がまず自信を持つ","challenges":"Neo以外のコミュニティも巻き込んだ企画への挑戦\n起業したい人、起業した人の話を聞く","insights":"自己分析や将来のキャリアについて言語化できている方が多いと感じた","tags":["挑戦・行動","地域・福岡","人を巻き込む","共創・つながり","笑顔・ポジティブ","ビジネス・起業"]},{"name":"山本秀太","category":"企業選抜","values":"失敗を恐れず挑戦し、経験から学び、自ら動いて周囲を巻き込みながら価値を生み出せる人でありたい。","impact":"周囲が挑戦しやすくなり、まずやってみようという空気を生み出せる存在になりたい。","vision_a":"互いに刺激し合い、失敗も共有できるオープンな関係性を築きたい。","vision_b":"挑戦する人を応援し、若い世代がチャレンジしやすい活気ある地域にしたい。","vision_c":"多様な人材が集まり、新しい価値やビジネスが生まれ続ける成長拠点にしたい。","vision_d":"失敗を許容し、挑戦が評価される社会にしたい。","vision_e":"多様な価値観を尊重しながら、人々が挑戦し成長できる機会が公平にある世界にしたい。","growth":"理論だけでなく実践を通じて行動力と巻き込み力を高め、経験を自分の言葉で語れるようになりたい。","future_self":"失敗を恐れず行動し、その経験を成長につなげながら価値を生み出せる自分でありたい。また、自ら動くだけでなく周囲を巻き込み、チームとして成果を出し続けられる存在になっていたい。","challenges":"自ら手を挙げて挑戦し、失敗も含めて経験を積む。特に、自分から人を巻き込む機会を意識的に増やしたい。","insights":"","tags":["挑戦・行動","地域・福岡","人を巻き込む","社会貢献","成長・スキル","ビジネス・起業","平和・世界"]},{"name":"小畑　敏力","category":"企業選抜","values":"周りの人に対して常にリスペクトを忘れずに行動する自分でありたい","impact":"周りの人が遠慮せずに自分自身を出せ、みんなで成長していけるような影響を与えていきたい","vision_a":"遠慮のない関係性を気づいていきたい","vision_b":"活気のあるイベントや行事ができればいい","vision_c":"暮らしやすい県として日本一","vision_d":"和の気持ちを前面に出して、日本特有の価値観を大切にする","vision_e":"全員が平等に暮らせるようになればいい","growth":"・最後までやり遂げる実行力を身につけたい\n・他人をリスペクトする気持ちを忘れない\n・笑顔で楽しんでやるマインドを身につける","future_self":"・固定観念にとらわれず、様々な考え方ができるようになる\n・前向きな発言で笑顔で引っ張っていけるようになる（一緒に成長する）","challenges":"・自分の力で成長するために0から1を作る挑戦をする\n・世代関係なく頑張っている人と一緒に頑張っていく","insights":"自分なりのなりたい姿などはあったが、他の人の話を聞くことでいろいろな考え方があると改めて感じたので、積極的にいろいろな方と関わっていきたいと思いました。","tags":["挑戦・行動","人を巻き込む","成長・スキル","笑顔・ポジティブ"]},{"name":"黒瀬　継太","category":"企業選抜","values":"失敗を恐れずに果敢に挑戦し続ける自分でありたい","impact":"周りの人をポジティブにさせれる影響を与えたい","vision_a":"常に前向きに物事を考え、不満で盛り上げるのではなく、未来の明るい話題で盛り上げる会社になったらいい。","vision_b":"町が活気で溢れて人が集まるような町になったらいいなと思ってます。","vision_c":"全国でも若手が集まる魅力的な県になったらいいと思ってます。","vision_d":"世界を牽引する日本になったらいいと思ってます。","vision_e":"争いのない、笑顔が絶えない世界になったらいいと思ってます。","growth":"・これまで前提を超える事がなかなか出来なかった為、これまでの常識にとらわれない前提を超える企画やアイデア力を身に着けたい。\n・挑戦を恐れないポジティブマインドになりたい。\n・自分の考えを分かりやすく言語化出来るスキルを身につけたい。","future_self":"・タカギの中で自ら発信していく自分になりたい。\n・周りの方を巻込んでいく存在になりたい。\n・挑戦を楽しんでどんどん挑戦する自分になりたい。","challenges":"・他企業の違う考え方を持った方とグループを作り、プロジェクトを立ち上げこれまでにない企画など実践していきたい。\n・リーダーシップを発揮して会社に貢献している方や起業して成功されている方（どのような考え方をされているのか知りたい。）","insights":"それぞれ違うビジョンを掲げていましたが、向いている方向性は一緒でしたので、共にビジョン達成に向けて頑張ろうと思いました。\nまた、自分の所属している企業しか知らない方がほとんどで他企業の考え方を柔軟に取り入れたい方やアイデアを学びたい方が多いと感じました。私もそうなので、どんどん吸収していければと思います。","tags":["挑戦・行動","人を巻き込む","社会貢献","成長・スキル","笑顔・ポジティブ","ビジネス・起業","言語化・発信","平和・世界","リーダーシップ"]},{"name":"篠原浩佑","category":"企業選抜","values":"正解を待つのではなく、自分で課題意識を持って行動し、また失敗か 会話が一生続いている人\n​ムードメーカー的役割の人","insights":"話している時の相槌を声に出すことが大切","tags":["人を巻き込む","成長・スキル"]},{"name":"城川士道","category":"ユース選抜","values":"自分が好きな事、やりたい事に情熱を持ち続ける自分でありたい","impact":"周りの人が自分を見て好きな事に対して行動せずにはいられないと思わせるような影響を与えたい","vision_a":"夢や将来について深く話せる仲間を増やしたい","vision_b":"学校と企業が連携した学生主体の活動を増やしたい","vision_c":"同じコミュニティでも新しい情報、新しい出会いが溢れた環境にしたい","vision_d":"日本中の活動やイベントが人を通して行き来し、少しの興味で気軽に行動出来る環境を作りたい","vision_e":"自分が好きなことに対して行動出来る機会や共有できるコミュニティがもっと周りに溢れた世の中にしたい","growth":"自分の理想を具体化させ人に自信を持って話せるようになり、既存のものに引っ張られず常に自分が求める理想を考えるイノベーター的な思考を持てる様になりたい。","future_self":"自分がワクワクする様な事を人を巻き込んで全力で楽しんで行動出来る自分になっていたいです。\nそして、自分を知り、自分の信念を常に貫き続ける様な尖った人間にもなりたいです。","challenges":"自分の思いを形として社会に出す経験をしたい。","insights":"目標を具体的に言語化する事は聞いた側に伝わる本気度や意思の共有でとても大切だと感じ、早く自分も夢を明確にして具体的な目標を見つけていきたいと思いました。","tags":["挑戦・行動","人を巻き込む","社会貢献","共創・つながり"]},{"name":"倉本佳史","category":"企業選抜","values":"自分の中で思うだけに留めず、具体的に言葉にして実現のために奔走する自分でありたい。","impact":"この人と一緒なら楽しいことができると思わせられるような、ワクワクを感じさせるような影響を与えたい。","vision_a":"部署ごとの考え方を活かせるよう、情報共有を盛んにしたい","vision_b":"(OHASHI HILLがある南区に特化して)\n中央区や博多区に劣らないよう、人が行き交うような街になったらいい。","vision_c":"一生住み続けたいと思えるような暮らしやすさを感じられる街になったらいい。","vision_d":"インバウンド需要に応えられるような観光に関する取組みを多く行うべきだと考える。","vision_e":"各国の留学生を派遣し合うなど、多くの価値観を共有し合うべきだと考える","growth":"誰かをワクワクさせられるようなことを考え、人を巻き込んでいくような企画ができるようにしていきたい。","future_self":"「いつか誰かがやるだろう」ではなく、「今、自分がやる」という主体的な姿勢をもつ。","challenges":"地域のために必要なことを考えることが仕事に直結するなど、地域活性化に携わっている方の話を聞いてみたい。","insights":"","tags":["地域・福岡","人を巻き込む"]},{"name":"中山陽友","category":"企業選抜","values":"自分との約束を守り、成長し続ける自分でありたいというのが核にある価値観です。一方で、成長への思いが強すぎる自覚もあるため、NEOを通して立ち止まる時間や寄り道する時間の大切さも自分の中に取り込んでいきたい。","impact":"周りに『この人といると、なんだかうまくいきそう』と感じさせるような人でありたいです。そして、一緒に答えを探しながら、お互いに育ち合える関係を築きたいです。","vision_a":"メンバー一人一人が、それぞれの仕事にやりがいを持って取り組み、互いの業務にも関心を持って協力し合える関係性。新しい挑戦を前向きに受け入れ、皆で何かを成し遂げる経験を共有できる関係性。","vision_b":"豊かな地元の食材を扱う商店や飲食店のように、その土地の文化や歴史が大切にされる地域。","vision_c":"自分が好きな福岡の良さ（食、都会と自然のバランス）が、10年後、20年後も同じように残っている福岡であってほしい。","vision_d":"若い世代が日本の将来について真剣に考えられる教育機会や社会環境がある日本。","vision_e":"テクノロジーによって世界中の人々の生活が豊かになり、明るい未来を想像できる世界。","growth":"私の癖として、枠の中にあるものを使って最善のものを最短で作ろうとしてしまいます。ですがそれでは、革新的なアイデアは生まれないと感じています。なのでNEOでは、仲間と意見を出し合い、立ち止まる時間や寄り道する時間も大事にし、枠を超えた発想を出来る人間に成長したいと思っています","future_self":"失敗や遠回りを恐れず、むしろ何事にも楽しみながら取り組む自分。\n巻き込み力を身につけ、仲間と一緒に何かを成し遂げられるようになっている自分。\n様々な境遇の方と繋がりを持ち、広い視野で世界を見られるようになっている自分","challenges":"・プロジェクトを引っ張っていくリーダーをやりたい\n・チームで何かを最後までやり抜く経験がしたい\n・自分にはない、枠を飛び出した発想を得意とする人に出会いたい\n・業界を作ってきた先駆者との繋がりを作る","insights":"グループでビジョンを共有した際、自分は『NEOで何を学び、どうなりたいか』を軸に話しましたが、他のメンバーは『会社に何か貢献するためにNEOで何を学びたいか』を軸に話していました。同じ問いに対して、出発点が違うことに気づきました。こういう気づきの連続で何か作り出すことがNEOの目的だと早速実感しました。","tags":["挑戦・行動","地域・福岡","人を巻き込む","社会貢献","成長・スキル","共創・つながり","子ども・教育","平和・世界"]},{"name":"岩崎俊太","category":"ユース選抜","values":"私は自分に壁を作らず、興味あるものにどんどん飛び込みようなふっ軽人間でありたい。","impact":"この人ならついて行きたいと思わせたい。","vision_a":"挑戦を応援してくれる","vision_b":"研究者が充実した毎日を遅れる町","vision_c":"福岡独自の魅力で福岡から離れる人を減らす","vision_d":"海外に負けない高い開発力を持つ国","vision_e":"産業成長が止まらない世界","growth":"挑戦楽しみながら、どんどんしていける人\nリーダーシップを持った人\n学習し続けられる人","future_self":"人を引っ張って物事を起こすことできる\n思いついたらやれる所までとことんする\n疑問に思ったらすぐ解決する","challenges":"人を巻き込めるようなリーダーシップの高い人と一緒にいる\n自分が主体となって周りを引っ張る\n様々な自分の興味のあるプロジェクトに取り組む\nNEOによって暇な時間を潰す","insights":"多種多様な目標や価値観を聞けて、その人のこれまでの人生が少しだけ感じられました。","tags":["挑戦・行動","地域・福岡","人を巻き込む","成長・スキル","平和・世界","リーダーシップ"]},{"name":"吉田　奈緒子","category":"企業選抜","values":"・性別・年代・国境などの垣根にとらわれず、誰に対しても対等に興味を持ち、学び続ける姿勢を大切にしたい。\n・いくつになっても好奇心旺盛で、話のネタが豊富な面白い人でありたい。","impact":"・自分の経験や考え、想いを語りながら、周りの人を前向きに後押しできる存在になりたい（笑顔・刺激）","vision_a":"社員同士仲が良いことを活かして、目標達成に向けてより貪欲に積極的に議論し合える社風を目指したい。","vision_b":"人と人とが繋がり、お互い助け合える交流が広がりバブルアップできるコミュニティがあると楽しそう。","vision_c":"国内でより国際交流の盛んな県にしたい。韓国・台湾にも近かったり、インバウンドも多いため、より注目される観光地にしたい。","vision_d":"日本のおもてなし精神を基調とした利便性のある行き届いたサービスを誇りにしながらも、働き手の生活も大事にバランスの取れた労働基準。","vision_e":"国境を越えて人と人とが協力し、人々の生活の豊かさや幸福を感じられる世界。","growth":"・好奇心を持ち、今mでの固定観念を取っ払い「どうやったらできるか」を考え、行動する力をつけたい。\n・仲間を巻き込み、現場実行力を上げ、チームで成果を出せるマネジメント力をつけたい。","future_self":"・「どうやったらできるか」を合言葉に、考え、周りと議論ができている人になっていたい\n・常に感謝と謙虚さを忘れず、実行力を持って行動し、周りから信頼され応援される人になっていたい","challenges":"・人事・広報・企業PRの視点での活動やAIスキルなど、今の仕事に役立つことも学んでいきたい\n・三木会長・三木校長や他事務局のみなさまのように、実行力のある経営者やリーダーの皆様からお話を伺いながら、会社では経験できないような新たなことにチャレンジしてみたい（海外事業に興味があります）","insights":"","tags":["挑戦・行動","人を巻き込む","成長・スキル","共創・つながり","笑顔・ポジティブ","ビジネス・起業","平和・世界","リーダーシップ"]},{"name":"松下遼","category":"企業選抜","values":"人を巻き込み先導できる自分","impact":"豊かにしたい","vision_a":"アンチトップダウン","vision_b":"固有のものを大切にしつつ利便性を上げる","vision_c":"進化を都市部だけにしない","vision_d":"日本特有の美意識を風化させない","vision_e":"資源の共有","growth":"経験を生かした新規事業をバンバン作りたい\n自分の能力を活かす道","future_self":"プロジェクトを引っ張っていく存在\n次期部長になるために1年後に事業のTOP","challenges":"圧倒的リーダー\n新規事業の立ち上げ","insights":"開発部門の方の話はとても参考になりました。\nすでに刺激をもらえてるので\n自分も与えられるような知見を広げたい","tags":["人を巻き込む","成長・スキル","ビジネス・起業"]},{"name":"國政　雄太郎","category":"ユース選抜","values":"関わってくれる全ての人への感謝を忘れずどんな状況下でも前向きで結果に拘り妥協しない自分","impact":"周りにエネルギーやワクワクする気持ちを与えたい","vision_a":"誰もが前向きで挑戦を臆さず自らの可能性を最大値まで解放できる世界","vision_b":"地域の人が惰性ではなくみんなワクワクして生活しているような世界","vision_c":"都市と田舎がうまく融合して人も富も集まり、東京よりも住みやすくワクワクする世界","vision_d":"みんな将来に希望が持ててワクワクする、主体性で溢れた世界","vision_e":"世界平和","growth":"自らの手足がより自由に動かせるようになりどこの世界に行っても当たり前のように成果を出していける再現性の高いマインドや能力を養い、将来のなんとなくのぼんやりしているビジョンをより明確なものにしたい","future_self":"沢山の人を巻き込み沢山の人から学び吸収して、自分の想像を超える自分になり、なんとなくの抽象的な考え方をより言語化して再現性高く遊びながら挑戦して結果を出す。","challenges":"社会人の方とたくさん関わり自分に足りないものを知り学びたい\n困難を乗り越え大きなことを成し遂げている人に出会い、何かを成し遂げている人の共通点などを学びたい\nワクワクすることにより出会いたい\n人　物　金の流れを学びたい\nどうして三木兄弟が福岡でこんなに沢山の人や企業から応援されて、いるのか本質的な事を学びたい\n自分と全く違う考え方をする人に出会いたい\n戦友みたいな仲間に出会いたい\n","insights":"それぞれが違った目的で参加しておりたくさんの学びがあった。","tags":["挑戦・行動","地域・福岡","人を巻き込む","社会貢献","成長・スキル","共創・つながり","言語化・発信","平和・世界"]},{"name":"大西雄大","category":"ユース選抜","values":"人それぞれ価値観は違うから他人に自分の価値観を押し付けては行けない","impact":"自己開示をして、自分のやりたいことを熱量持って発信し、方向は違えど、自分の熱を伝播させたい","vision_a":"環境意識を義務からクールへ","vision_b":"福岡市を巻き込む","vision_c":"産官学連携","vision_d":"日本モデルが世界基準に","vision_e":"環境分野で世界を動かす人になる","growth":"熱量が低い人にも自分のビジョンを話して自分の殻を破る\n上と似ているが、自己開示をすることによる否定を恐れない\n言語化能力、ビジネス基礎用語、リーダーシップ力","future_self":"自分のビジョン（環境分野）を発信して影響力のある人になる\n人前で話すと緊張するくせを無くす\n起業してマネタイズする","challenges":"熱量持ってなにかに取り組んでいる人\n羞恥心をなくそうとしてる人\n自分の殻を破ろうとしてる人、した人\n自分をこの人やばいと圧倒させてくれる人！","insights":"みんな完璧そうに見えて実は課題もあるんだなと思った。あとみんな自分を見つめているからこそビジョンの質や価値観のレベルが高かった","tags":["地域・福岡","人を巻き込む","成長・スキル","ビジネス・起業","言語化・発信","平和・世界","リーダーシップ"]},{"name":"杉本光","category":"ユース選抜","values":"誠実でありたい。自分にも他社にも双方向的に価値のある、再現性のある自分でありたい。","impact":"がんばることを楽しめる。目的を見失わず自分たちのしたいことにしっかりと向かえるようにしたい。","vision_a":"最高の楽しいを作る。学ぶ人、働く人、遊ぶ人、運動する人、皆が自分の目的を持ち、何のために何をするのか分かる。自分を知って自分らしく生きれる社会を作る。","vision_b":"自分の価値を意義を目的を理解して、プライドを持って働ける人を増やす。","vision_c":"自分らしく誇りを持った人が再現性ある形で、リソースが最大化され、持てるポテンシャルを最大限発揮し、前向きでより影響力のあるものを生み出せるように。","vision_d":"企業という単位の組織から始まり、すべての人が持つポテンシャルを発揮できる社会を作り上げる。","vision_e":"社会の歯車が完璧にかみ合って、もっと世界が豊かで笑顔のあふれる世界にしたい。","growth":"目的に対してHOWを実行し、やりたいことすべてできるようになりたい。自分にも他社にも誠実でありたい。","future_self":"本当の自分を知って、いつでも大好きな自分でいられるようになりたい。（どうありたいかを含め、再現性のある自己を確立したい）","challenges":"出会う人ぜんいんから学び吸収する。意見も非難も自分の糧にする。","insights":"","tags":["社会貢献","成長・スキル","笑顔・ポジティブ","平和・世界"]},{"name":"飯森航大","category":"企業選抜","values":"・勇気をもって一歩踏み出すこと\n・どんな時でもユーモアを忘れないこと\n・そのうえで、多様性を尊重し、平和を希求する存在でありたい","impact":"・「生まれてきたよかった」と生きがいを感じられるような影響力\n・それぞれの違いを尊重し、互いに協力し、手を取り合えるような影響力","vision_a":"・まずは仲良く。\n・そして、切磋琢磨しあい、熱く。\n・エネルギーの源となるような集団。","vision_b":"・形は変われど、とにかく残っていってほしい。\n・特に、伝統文化は、これまでの先祖の知恵であり、文化の喪失は人類への大きな損失だと思う。","vision_c":"・日本を牽引するコミュニティであってほしい。\n・ロールモデル・お手本となるようなコミュニティであってほしい。","vision_d":"・未来に希望を持てる社会。\n・分断ではなく共創する社会。\n・誰も取り残さない社会でありたい。（地方の過疎化、医療、教育等）","vision_e":"・誰もが豊かさを享受し、争いがなく平和な社会。\n・生きがいを感じ、誰もが輝いている社会。\n・私たちの子孫や地球上の生きとし生けるものが、自分たちの死後も、幸せに生きられる世界。","growth":"・物語を描き、理想に対して、周りを巻き込んでいくような存在となりたい。","future_self":"・地球視点、宇宙視点で社会を捉える視座がある。\n・社会課題に対しての解像度が深い。\n・課題解決ができる人的ネットワークや関係性の構築。","challenges":"・世界を良くする活動であれば何でも。今よりももっと大きな影響力で貢献出来たら理想的。\n・ロールモデルとなるような師匠、メンター\n・同志","insights":"","tags":["挑戦・行動","地域・福岡","人を巻き込む","社会貢献","共創・つながり","子ども・教育","笑顔・ポジティブ","平和・世界"]},{"name":"久保山亜美","category":"企業選抜","values":"周りの人への感謝の気持ちを忘れないこと。\nどんなことに対してもすべては意味があることだと前向きに捉える。\n自分自身を幸せにすることで、周りの人にそれ以上の幸せを届けられる人。\n惜しみなく周りの大切な人に愛情を注げる人。\n","impact":"周りの人に「何かあったら久保山にとりあえず相談したらどうにかなりそう」と思われるくらい頼りがいのある人になり、自分が持っているリソースを惜しみなく周りに還元し、笑顔に、幸せに、プラスな感情になれるように尽力したい。\n1年後に、「久保山みたいになりたい！」と思ってもらえる人がいて、その人たちに刺激を与え、周りの成長も促せるような人財になりたい。","vision_a":"【お互いに本音をぶつけあい、よりよい形を一人残らず全員で作っていけるチーム（関係性）】\n私は、人財開発室に属し、主に採用業務に従事しているため、人財開発室のメンバーがどのようにしたらモチベーションが上がるかを理解し、メンバーを後押しできるような関係性になりたい。\nまた、お互いの意見を尊重しあえるように、いい形でクラッシュできるチームにしたい。","vision_b":"【人と人のつながりを創出し、安心できる地域に】\n私は就職を機に唐津市に引っ越しをしました。唐津に行くと、ご近所の方や人と人とのつながりが濃く、挨拶をする人たちがたくさんいらっしゃったり、唐津の人の優しさに救われたり、笑顔になる瞬間も多くありました。\n都会だから、田舎だから、という違いはあるかもしれませんが、唐津のそんな人々の優しさや人懐っこさが唐津の穏やかな雰囲気を出しており、それもそれで一つの特色だと感じました。\nそのような「思いやり」や「人の温かさ」を、AIだけではなく、人にしかできないことを大切にし続け、人だからこそ感じられる優しさを共有しあえる地域になってほしい。","vision_c":"【情報の格差を埋め、どこにいても可能性を広げられる福岡へ】\n福岡は今、都会としての勢いがあって刺激的ですが、その一方で田川のような地域では平成筑豊鉄道廃線のニュースなど、地域の方にとっては生活が厳しくなっている現実もあります。ボランティアなどを通じて両方を見てきたからこそ、住む場所や環境による「情報の格差」が、人生の選択肢を狭めてしまうのがもったいないと感じます。\n\n私は、福岡のどこにいても、誰もが自分に必要な情報に触れることができて、未来にワクワクできる街にしたいです。\n\n「知っていれば選べた道」を一つでも増やせるように、私自身が客観的なアドバイスをしたり、一緒に考えたりできるサポーターになることで、一人ひとりの可能性を広げるお手伝いをしたいです！","vision_d":"【世の中に残っているいい会社が、”人”の問題で諦めなくていい日本にしたい】\n\n普段、人事採用の仕事をしておりますが、今の時代は人材を確保することが難しく、せっかく世の中にとって必要な事業をしているのに「人が採れない」という理由だけで会社を畳まざるを得ないケースもあるかと思います。そこで働いている従業員の方たちの幸せな状態をなくしてしまうことは悲しいことだと感じております。\n\n私は、世の中の企業の方たちが夢や志をあきらめることなく、採用の側面からサポートをし、その幸せを作り続けられたら素敵だなと思います。\n\nそのために、今の自分に足りない知識や冷静な判断力をしっかり磨いていきたいです。\n採用の力で会社に活力を与え、そこで働く人たちが「この会社で良かった！」と思えるように、自分にできることを最大限できる自分になりたいです！","vision_e":"【世界平和】【どんな環境であれ、その人たちが「幸せ」と思える地域が増えてほしい】\n\nインドネシアでボランティアをした経験があり、生活水準は違えど、その村には課題がありながらも彼らなりの「幸せ」を守りながら生活をしていた。そんな村ばかりではないだろうから、もっと世界中に「幸せ（＝生きていてよかった）」を感じられる地域が増えていってほしいと願う。\n当時は、ハンセン病恢復村を訪れ、就業に困っている人がいる実情も知った。日本のビジョンからもつながるが、雇用を作り出す＆雇用を守り続けることが難しい国もあるため、日本での採用と、世界で起こっている雇用創出においても結びつけて、何かしらアクションを起こすことができればいいな、と思います。","growth":"・チームの成果を最大化させるためのマネジメントスキルを習得する。\n・どのような課題に対しても、前向きかつ楽しみながら挑戦できる精神力を養う。\n・物事を多角的に捉え、常に冷静かつ客観的な判断ができる自分でありたい。","future_self":"・どんなことに対しても前向きに取り組み、毎日を楽しめる人。\n・周りの人たちのモチベーションを高め、巻き込める人。\n・「でも」という言葉を使わず、どうしたらできるか【How】の精神を持ち、すべてを前向きに捉えられるような考え方を習得したい。","challenges":"・チームの育成やマネジメントに注力している人に出会いたい。\n・仲間とともに、困難を乗り越える達成感を味わいたい！\n・課題を見つけ、解決に向けたディスカッションを重ね、ぶつかったとしてもみんなで意見をまとめられる経験をしたい。","insights":"それぞれの目指している個性や世界観などが出ており、そんな周りの人たちの良さを最大限に生かせるチームを作り、ミッションに取り組みたいと思いました。今回のグループは同じ会社の同じ同期でしたので、チームを組むときには別々になるとは思いますが、お互いに切磋琢磨しあえる仲間として頑張っていきたいです！","tags":["挑戦・行動","地域・福岡","人を巻き込む","成長・スキル","共創・つながり","笑顔・ポジティブ","ビジネス・起業","平和・世界","リーダーシップ"]},{"name":"柴田梨愛","category":"ユース選抜","values":"Be playfulを常に頭にいれ笑顔を絶やさず活動したいです。自分自身が持っている様々なことへの好奇心から行動にうつせる自分でありたいです。\n自分自身の事を常に大好きと思える自分でありたいです","impact":"自分が笑顔を絶やさず活動することで周りの人も笑顔に溢れ、困難も一緒に乗り越えられたらいいなと考えます。\n周りの人にエネルギーを与えて、背中を押してあげられるような存在でありたいです！","vision_a":"全員が笑顔で自分自身に自信があり輝いている","vision_b":"年齢関係なく全ての人で協同する","vision_c":"今までになかったような新しい事業を始めたりすることにより、より全ての人が生きやすい県にする！","vision_d":"地方を活性化させ、環境を守りながらも経済を発展させる","vision_e":"持続可能で平等で紛争などがない世界","growth":"CANで考えるのではなくHOWで考えられるようにする。\n自分の考えを簡潔に言語化できるようになる\n自分から周りの人を巻き込んでいけるようにする","future_self":"常に自分自身のことが大好きな人になりたいです。\n受け身の姿勢ではなく率先して自ら動き、新たな考えを生み出して少しでも新しい風がふかせられる人になりたいです。\nチームをまとめられる人になりたいです","challenges":"チームをリーダーとしてまとめてみたいです。\n今までの常識を覆せるような考え、価値観のある人と出会いたいです。\n壁にぶち当たったときもチームのみんなで乗り越えていきたいです","insights":"やはりビジョンを共有してみると自分よりも具体的で解像度の高いビジョンが浮かんでいる人が多いと感じたので今から、将来のビジョンの解像度を高めていけるようにしたいです。\n自分にはなかった考えを知ることができてとてつもなく楽しく、ワクワクした有意義な時間でした。","tags":["挑戦・行動","地域・福岡","人を巻き込む","共創・つながり","笑顔・ポジティブ","ビジネス・起業","言語化・発信","平和・世界"]},{"name":"岡松倭","category":"企業選抜","values":"基本的にALLYES精神。全ての人に可能性がある","impact":"自分自身が躍動し自己の可能性を最大化が前提で他人も躍動できる環境づくりを人生の友として接することで長期的にお互いに成長できる関係性","vision_a":"影響力をつける","vision_b":"活性化","vision_c":"活性化","vision_d":"仕事に対してのマインドの変革\n\nただお金を稼ぐのが仕事ではないということ。より豊かな人生にし社会通念に囚われず自己改革に励むような人や企業を一個でも多く作りたい","vision_e":"世界中の幸せ","growth":"個人で人がついてくるような人間力と影響力","future_self":"なんでもできる精神。なんでも楽しめる。主体的の鬼","challenges":"全て学びに行き実際に何が自分で活かせるのか何をすぐに実践できるのかを考えてアクションまで繋げる回数を増やすこと","insights":"","tags":["社会貢献","成長・スキル","笑顔・ポジティブ","平和・世界"]}]},{"id":"local","icon":"🏙️","title":"地域・福岡活性派","color":"#F39C12","desc":"地域・福岡・九州を盛り上げ、住む人が誇れる街をつくることがビジョンの核","members":[{"name":"畑山大志","category":"企業選抜","values":"失敗を恐れない自分","impact":"周りの人を明るくしたい","vision_a":"明るい環境にしたい","vision_b":"福岡で一番盛り上がりたい","vision_c":"九州で一番盛り上がりたい","vision_d":"日本で一番盛り上がる県にしたい","vision_e":"世界一で一番魅力的な町にしたい","growth":"企画力アップ","future_self":"影響を与える人","challenges":"いろんな人を巻き込みたい","insights":"","tags":["挑戦・行動","地域・福岡","人を巻き込む","笑顔・ポジティブ","平和・世界"]},{"name":"吉田将吾","category":"ユース選抜","values":"人に驚きと笑いを与えるヨシダショウゴ\n単に面白いものを作るだけでなく、自分という存在が介在することで、その場の空気が動き、人々の感情がポジティブに揺れ動く瞬間を大切にしたいと考えています。","impact":"「ヨシダショウゴ」というハブを通じて、本来出会わなかったはずの人やモノが繋がり、自然と笑顔の輪が広がっていくような影響を与えたいです。","vision_a":"少人数のチームでプロジェクトを完遂させてきた経験を活かし、身近な人が持つアイデアを具体化して実行できるまでサポートし合える関係性を築きたいです。","vision_b":"地域の人々が自然と集まり、驚きと笑いが生まれる場を増やしたいです。自分の価値（油そば、マジック自身のSNS）がきっかけが地域に新しい活力が循環していく姿が理想です。","vision_c":"福岡が「新しいことを始めたい」と願う人にとって最も挑戦しやすい街であってほしいと考えます。新しいことをする環境が自然と生まれ福岡の人達それぞれが盛り上がる未来を作りたいです。","vision_d":"自分らしさを大事にしてる人が日本にたくさん生まれればいいと思います。努力を笑わないし、目的のために頑張る人を称賛する人がいればいい！","vision_e":"世界平和。\n\n自分のお笑いが世界中の人に影響を与え、争いが自分の笑顔で止まる世の中であってほしいです。","growth":"ビジネススキルやマナーの習得はもちろん、物事を俯瞰する能力やリスク管理、報連相の徹底を身につけたいです。特に「アイデアを具体化し実行する力」を磨き、思考の限界を超えて、NEOという枠を超えた「ヨシダショウゴ」というブランドを確立させるための強固な土台を作りたいと考えています。","future_self":"自分の信念に理論を立て、自分らしさを正しく表現できる「深みのある人間」になりたいです。一つ一つの言葉に責任を持ち、軽率な言動を慎むことで、周囲から信頼されるロールモデルを目指します。また、地元・島原に人を呼び込むようなイベントを実現させていたいです。","challenges":"多様なバックグラウンドを持つ人々と出会い、その体験談を吸収することで、自分の人生の指針となる「解」を見つけたいです。自分にはない視点を持つ人との対話を通じて、やりたいことを明確にし、実行に移すためのマインドセットを学びたいです。","insights":"2期生の圧倒的な行動量に焦りを感じましたが、それを「努力の必要性」と捉え、全員をライバルとしてリスペクトしながら切磋琢磨したいと強く思いました。自分の試行回数の少なさや言語化の甘さを痛感したため、今後は常に「提案に乗った先の未来」を思考し続け、自分の時間を人生の糧にする意識を常に持ちたいです","tags":["挑戦・行動","地域・福岡","成長・スキル","共創・つながり","笑顔・ポジティブ","ビジネス・起業","平和・世界"]},{"name":"上田啓太","category":"企業選抜","values":"常に責任を持ち自己完結出来る為に努力する姿勢を大切にし、ブレず前向きであり続けたい。","impact":"常に前向きで、ポジティブな思考へ転換させたい。","vision_a":"個々の意見を持ち、周りの目を気にせず自身の意見や個性を発揮できたらいい。","vision_b":"インバウンドや外資に依存せずに地域単位での自律性を高めていければいい。","vision_c":"地域インフラの課題が解決し、それに伴う高齢者や子育て世代へのケアや課題解決に繋がればいい。","vision_d":"少子高齢化による人口減、それに伴う経済不安が解決すればいい。","vision_e":"紛争がなくなり、武器産業・デジタル産業・強国の世界の傾きがなくなればいい。","growth":"自己目標に対し、突き進む力を強化したい。","future_self":"現在構想している事を事業化し、子会社化したい。","challenges":"独創的な視点をお持ちの方と出会いたい。","insights":"","tags":["地域・福岡","共創・つながり","笑顔・ポジティブ","ビジネス・起業","平和・世界"]},{"name":"茂山和寛","category":"ユース選抜","values":"気楽に物事に飛び込んで、何かしらその場合に残せるようなクリエイターでやりたい","impact":"物事に飛び込んだ後、その場に気軽に物事に飛び込めるような文化を作りたいまた、物事に挑戦する人と、お互いに影響し、合えるような関係を作りたい","vision_a":"学内の活動が部室内に閉じこもらず、たくさんの魅力的なサークルと偶然の出会いを得て新しいイノベーションが起き続ける状態","vision_b":"「たまたま隣にいた」という偶然の出会いをワクワクするような協力関係に変え、大学で生まれた新しいアイデアを地域の暮らしに役立てていく。","vision_c":"「たまたま隣にいた」っていう偶然の出会いを、若者の挑戦の文化に変えて、そこに大人の応援と遊び心が混ざり合っていく。そんな福岡らしいオープンな熱量を、キャンパスの中だけで終わらせずに、この街全体の日常にワクワクとして溶け込ませていきたい。","vision_d":"日本が掲げるのは、異質な才能を排除するのではなく、互いの違いをリスペクトし、称え合う文化。誰かの失敗を笑うのではなく、その挑戦を支え、次の成功へと繋げていく。\n世界で最も挑戦を愛でることが出来る国にする。","vision_e":"世界を、巨大な実験室であり、劇場にすること","growth":"自分を大きく見せない\n承認欲求で意思決定しない\n自ら問いを立てかつ前提を超える事\n会社との関係の気づき方、コミュニケーションの取り方を習得する","future_self":"謙虚になり、もっと物事の見方が変わること\nこれからの活動においてのスタンスや基礎ができている\n真のクリエイターとしてのスタート地点を切る","challenges":"自分をロールモデルをコンセプトに自分なりのクリエイティブ系に昇華する\n","insights":"","tags":["挑戦・行動","地域・福岡","成長・スキル","共創・つながり","子ども・教育","平和・世界"]},{"name":"藤松拓実","category":"ユース選抜","values":"できるかどうかじゃなく、やりたいかどうかで生きる","impact":"自分が体現することで、周りの人の可能性の天井を上げたい","vision_a":"関わった人全員の、人生の質を上げたい","vision_b":"地域が、顔の見える関係性で満ちている状態","vision_c":"福岡からロールモデルを生み出す","vision_d":"夢を語ることを恥ずかしがらない日本。挑戦と失敗を笑って前に進める社会。経済を動かすことで、人々の心に余裕を取り戻す","vision_e":"戦争がない。バイアスがない。","growth":"ビジネスの具体性を高めてみれるようになる。","future_self":"社会を知り、失敗をたくさんし、様々な人とつながり経験することで深くなりたい。","challenges":"同世代の仲間、企業の意思決定者、新卒人事の方に出会いたい。","insights":"","tags":["挑戦・行動","地域・福岡","社会貢献","共創・つながり","ビジネス・起業"]},{"name":"山内傳太郎","category":"企業選抜","values":"自身だけでなく周囲も楽しく、スキルアップしながら目標に対して取り組む自分でありたい","impact":"周りの人が自身の力を発揮できるような良い影響を与えたい","vision_a":"地域企業や自治体と関係を築き困ったときにまず声をかけてもらえる会社","vision_b":"地域の課題を地域で解決できる、老若男女の生活が活発な地域","vision_c":"福岡県で育まれた文化などを日本中に広げていけるようなリーダー都市","vision_d":"消費者の生活が海外情勢に左右されないような基盤が確立している","vision_e":"異なる価値観の中で強調し合い、資源や技術の不足を補い合える世界","growth":"自身の行動により周りの人が最大限力を発揮できるようなポジティブを振りまけるようなスキル","future_self":"とにかくポジティブ。苦しい状況でも前を向ける、前を向かせられる自分になっていたい","challenges":"・即行動できる人\n・難しいことでも工夫して乗り越える経験","insights":"ゼンリンは受け身な3人が揃っていたので3人で能動的な人間になり会社にいい影響を持ち出せるようになりたいと感じた","tags":["挑戦・行動","地域・福岡","人を巻き込む","成長・スキル","笑顔・ポジティブ","平和・世界"]},{"name":"小野萌子","category":"企業選抜","values":"後悔をしない人生を歩む自分","impact":"楽しいと思うことをするためにとりあえず周りを巻き込んで、目標までの道でさえ周りまでを楽しくさせる。","vision_a":"○○を解決するためには小野に相談したらいいと思う、と言われる立ち位置","vision_b":"行きやすい隣町のように親しみがあって温かい地域","vision_c":"九州を代表して、本州・日本とつながるための通過点となるほどの信頼のおける県","vision_d":"円安を止める。\n文化・伝統を守りながらも先進国に劣らない、一目置かれる存在の国","vision_e":"わかりません。","growth":"現時点で主に、人の話を聞き見通しを立てて実行するという部分が自分にかけている部分だと思っている。周りの話を偏りなく聞いたうえで客観的に物事の解決策を提案することのできる能力（どんな時も落ち着いている？）を身に着けたい。","future_self":"自分の偏見で物事を見ない。大きめの目標を立てることに怖さを感じない。なにかに特出した能力を身に着けたい。","challenges":"ポジティブな言葉を出せる人と出会いたい。\n自分の思っていることをきれいに伝えることができるようになりたい。\n端的に、わかりやすく要点を押さえて説明できるようになりたい。","insights":"","tags":["地域・福岡","人を巻き込む","成長・スキル","共創・つながり","笑顔・ポジティブ","言語化・発信"]},{"name":"木村友大","category":"企業選抜","values":"信頼される人間であり、小さなことでも全力でやりきる自分でありたい","impact":"自分がいることで周りが活気あふれてくるような影響を与えたい","vision_a":"信頼される人間","vision_b":"様々なソリューションを行い、地域を盛り上げられる企業また、個人としても知名度がある状態","vision_c":"様々なソリューションを行い、福岡を盛り上げられる企業","vision_d":"会社の知名度は、企業や年配の方が知っている傾向にある。日本全国で知名度のある会社にしたい","vision_e":"世界でも知名度のある会社にしたい","growth":"思考を言語化し、多角的視点から考えたことを相手にわかりやすく伝えられる\nやらない後悔より挑戦できるマインド","future_self":"多角的な視点から物事を考えられる\nおもしろさや遊び心を企画できる","challenges":"・やらないで後悔するより何事にも挑戦したい\n・共に高め合える人","insights":"","tags":["挑戦・行動","地域・福岡","言語化・発信","平和・世界"]},{"name":"天野総太","category":"企業選抜","values":"・人や意見などに対し、否定せず尊重できる人間でいたい","impact":"・相手を尊重することで、明るい雰囲気にし、円滑なコミュニケーションを取れるようにしたい","vision_a":"自分自身が組織の一員として携わった業務が、目に見える形で世間に貢献できればと感じている。※会社の役に立ちたい","vision_b":"商店街のような地域密着できる場所と、コンビニや商業施設等の利便性高い場所が両立できる地域を維持、活性化したい。","vision_c":"北九州、福岡市あたりだと県外からの知名度が高く感じるが、同時に他の区の知名度があまり高くないように感じる。(あくまで主観)\n難しいと思うが、外（県外、海外）から見た魅力がバランスよくある県にできたらと思う。","vision_d":"ニュースや記事から、東京一極集中による各地域や県で過疎化・空洞化が起きていると把握している。また左記により、各県の専門職を担う人の減少しているという情報もよくある。これらの課題に対し、各県、各産業などが若き担い手へ、魅力に感じれるようなプロモーションが必要ではないかと感じている。","vision_e":"あまりイメージできないが、昨今の戦争により、資源の価格が高騰している。そのため、他国の情勢、資源に依存することなく安定した資源を手に入れることができるようになればと感じている。","growth":"・自分自身の発言、行動に自信を持ちたい\n・受身から主体性のマインドになりたい","future_self":"・自信を持って「卒業」と言える活動を行い、成果を出したい※自信を持ちたい\n・自社へ還元できる特技を持ち帰りたい","challenges":"・主体性、積極性(自分自身にない能力が)ある人と出会いたい","insights":"・「他社様、世代間の意見を取り入れて自社若しくは自分自身の固定観念・常識を破りたい」という意見が出ており、自分自身も他社様、自社外の同世代の方々と意見交換できる場が無かったため、自社を越えて、様々な考え方を聞き、取り入れていきたいという気持ちが芽生えた。","tags":["挑戦・行動","地域・福岡","社会貢献","成長・スキル","共創・つながり"]},{"name":"西原鷹太（ニシハラヨウタ）","category":"ユース選抜","values":"常に成長し続けていきたい。今の自分に満足せず、心の豊\nかさ、知識、経験、ルックス、収入、全てレベルアップしていきたい。","impact":"周りの人をたくさん笑わせたい。一緒にいて楽しい人になりたい。","vision_a":"自分を高めることに集中してる人達とお互い高めあいたい。一緒に早寝早起きトレーニングをしたい。","vision_b":"大濠公園のように自然と触れ合いながらランニングや散歩を楽しむ人がいっぱいの地域にしたい。","vision_c":"歩いてるだけで楽しいアートにあふれた町にしたい。沖縄県のアメリカンヴィレッジが好きで、おしゃれな雰囲気の町にしたい。","vision_d":"仕事の日も休みの日も、毎日起きるのが楽しみだと感じて生活する人がいっぱいになってほしい。","vision_e":"ワールドカップやオリンピックが好きで、世界が盛り上がるイベントをもっと盛り上げたい。","growth":"自分の利益や自分の成長だけでなく、福岡の未来や世界を作っていく側になりたい。","future_self":"neoを通して自分が福岡を変えたんだと実感しながら、街を歩きたい。","challenges":"今福岡を背負ってる人たちと出会い、自分も引っ張っていく1人として何ができるか見つけていきたい。","insights":"皆高い目標を持っており、既に結果を出している人もいて自分の未熟さを実感した。","tags":["地域・福岡","人を巻き込む","成長・スキル","共創・つながり","笑顔・ポジティブ","平和・世界"]},{"name":"伊東大樹","category":"企業選抜","values":"『敬意・誠実・感謝を基盤に、他者に不必要な不快や不利益を与えず、現状を疑いながらより良い在り方を追求していく』ことを大切にしたいです。","impact":"誠実さと改善意識の両方を持って、周囲が安心して協力でき、より良い方向に進める影響を与えたいです。","vision_a":"起きた事象に対して愚痴で終わらせるのではなく、原因と再発防止策を誰でも遠慮なく出せる環境が望ましいと考えています。\nさらに、その意見を実際の改善に繋げていくことで、新たな視点が生まれ、会社と社員の成長に繋がって欲しいです。","vision_b":"環境の美しさを当たり前とせず、それを支えている人への意識やリスペクトが共有される地域が理想です。\nその積み重ねが、住みやすい地域の環境に繋がると考えます。\nその為、もっと周りの当たり前の事にも意識を向けてリスペクトできる環境になったらいいと思います。","vision_c":"九州最大の福岡県だからこそ、DX・GX・AXに特化し、ウーブンシティのような未来実験都市を掲げるほどの大胆な挑戦で、日本を先導する次世代モデル都市を目指してほしい。","vision_d":"外国人には多様な価値観がありますが、日本には日本人として守るべき文化や価値観がある中でこそ、日本で暮らす以上はまず日本の文化やルールへの敬意が前提であり、その上で、日本側も自国の価値観を大切にしながら相手の文化も理解し、互いに礼節ある関係を築ける社会になればいいと思います。","vision_e":"AIをはじめとする技術がもっと生活レベルまで浸透し、誰もがAIを活用・創造できる社会になれば、エネルギー問題や食料問題など世界課題の解決策は、さらに広がる社会になればいいと思います。","growth":"・個人プレーから周りを巻き込んだチームプレーができるように成長したいです。\n・他業種の方々の仕事への価値観に触れ、感銘を受けた内容に関しては自分に落とし込み、自分の価値観をアップデートしていきたいです。","future_self":"・ゴール設定を明確にしてその為に必要な人脈、人材、スキルを巻き込んでいく考え方を当たり前に出来るようになっていたいです。\n・大枠な抽象的思考から更に深堀した具体的なビジョンにまで落とし込むのが当たり前に出来るようになっていたいです。","challenges":"NEO福岡に参画している企業を巻き込みながら、まずアカデミア生で社会課題を設定し、その課題解決につながる可能性のある企業同士を結び付けていきたいです。さらに、NEO参画企業だけでなく、そこに紐づく協力企業も含めて連携を広げ、より多くの力を集めながら社会課題の解決に挑戦していきたいと考えています。","insights":"自分で当然出来ると思っていた事が、相手にとっては苦手としているのを実際に言われて気付きを得ました。\nこのことで、一つ自分の強みとなりうる伸びしろを感じました。","tags":["挑戦・行動","地域・福岡","人を巻き込む","社会貢献","成長・スキル","子ども・教育","平和・世界"]},{"name":"金子照生","category":"企業選抜","values":"「ビジネスとしてうんぬん」ではなく、世の中にどんな影響を与えられるか、今は存在していない文化を作ることができるか、という視点を大切にしています。\nまた、そのような自分が「面白い」と思ったことを実現するために、多くの人(内部も外部も)を動かしていける人間になりたいと考えています。","impact":"現状ではまだ会社やビジネスの枠組みでしか考えられていない人もいると思うので、より高い位置から広く世の中を見て考えるということを一緒に実践していけたらいいなと考えています。","vision_a":"上とも下とも対等に話せるだけの知識と人間性を持つ","vision_b":"とくになし","vision_c":"「日本の端っこ九州でデカい顔をしている県」というのが関東や関西から見た福岡だと思うので、もっと福岡の魅力を発見し磨き上げていくことで、県外から「福岡に住みたい」「福岡で働きたい」という人が集まるようになるといいなと考えています。","vision_d":"日本で作られ世界で使われるモノやサービスが増え、国として強くなっていくことが重要だと考えています。\nまた、日本では仕事が全てにおいて優先されるという考えの人間が多いと感じているので、仕事は人生の一要素であり、考えるべきは人生そのものの質を上げることだ、という考え方が当たり前になるように世の中に働きかけていきたいと考えています。","vision_e":"他者との違いを理解し受け入れ、しょうもない意見の違いで戦争をするようなことがなくなるといいなと思います。","growth":"周りを巻き込んでいく力を強めたいです。","future_self":"世代や視座の違いにより意見が違うことは多々あると思いますが、全ての意見を一度自分の中に落とし込み、固定観念に捉われずに判断することができるようになりたいです。","challenges":"・一見すると「アホすぎるやろ！」と思えるようなアイデアを出せる人\n・周りに伝播するほどの強い熱量を持っている人\n・何か面白いことをやりたいと考えている人","insights":"","tags":["地域・福岡","人を巻き込む","ビジネス・起業","平和・世界"]},{"name":"岩本　洸","category":"企業選抜","values":"論理的、合理的、熱量、最速行動、協調性","impact":"熱量を持って行動することの大切さ","vision_a":"新規事業の進め方や、リーダに求められる姿等を体系的に学び、社内に還元（人的教育、企画アイディア等）すること。","vision_b":"地方活性化","vision_c":"副首都、経済活性化","vision_d":"少子化抑制、経済活性化","vision_e":"経済活性化","growth":"コミュ力、共感力、傾聴力","future_self":"・生涯の仲間や、プロダクト等を作りたい\n・周りの目を気にしない！最速行動！熱量！を徹底して出来ている自分になりたい","challenges":"・仲間と地域活性化に対する何かをして、社会の役に立っていることを肌身で感じること\n・自分に無いものを持っている尊敬できる人にたくさん出会いたい","insights":"個人としてではなく、会社の代表としての自覚を持ちながら12番までで記載したことを実行していきたい","tags":["挑戦・行動","地域・福岡","社会貢献","成長・スキル","共創・つながり","子ども・教育","ビジネス・起業"]},{"name":"笹川嵩孔","category":"企業選抜","values":"新しい技術を学び続け、新しい価値を生み出せるか考察し、実現のために行動をし続ける人間でありたい","impact":"自分がいて周りがhappyになるポジティブな影響を与えたい","vision_a":"大賀薬局の薬剤師がより人／地域の健康に寄与できるような土台がより成熟していったら良いな","vision_b":"地域がより健康で美しくなったら良いな","vision_c":"福岡がより福岡らしく、福岡が好きな人がより好きになるような社会になったら良いな","vision_d":"日本の伝統と文化を研ぎ澄まし、世界と共有し刺激を受け進化し続けてほしい","vision_e":"互いに尊重し考えをシェアできるような社会","growth":"新しいこと、流行、未来予想などにアンテナを張り刺激を受けたい。","future_self":"アクションの実行を意識的に増やす。アウトプットの手段を複数考える習慣をつけ、繰り返し実行する。","challenges":"やり抜く力を身近で見てみて刺激や学びを得る","insights":"","tags":["挑戦・行動","地域・福岡","社会貢献","成長・スキル","笑顔・ポジティブ","平和・世界"]},{"name":"中村亮太","category":"企業選抜","values":"人生を楽しむ、熱中していろんなものを生み出していく","impact":"自己成長を一緒に楽しみたい","vision_a":"想像をもっと形にする","vision_b":"若い人がビジョンを形にする地域に","vision_c":"アジアの中心地に生まれ変わる","vision_d":"志を持って世界に挑む","vision_e":"面白い世界が広がっている","growth":"泥臭く動くことをもっとする。形にする力。意図を持って組み立てる。","future_self":"オーラが出ている","challenges":"熱量が高い人","insights":"","tags":["地域・福岡","成長・スキル","笑顔・ポジティブ","平和・世界"]}]},{"id":"social","icon":"🌍","title":"社会・世界貢献派","color":"#1ABC9C","desc":"社会課題・教育・子ども・次世代・世界平和への貢献を中心に据える","members":[{"name":"木下　紗希","category":"企業選抜","values":"私は、「人に喜んでもらうこと」と「たとえ大変なことでも自分自身が楽しめているか」を大切な価値観としています。\n相手の役に立ち、喜んでもらえることにやりがいを感じる一方で、どんな状況においても自分自身が前向きに楽しむ姿勢を忘れないことが、継続や成果につながると考えているためです。\nそのため、何事にも楽しみながら挑戦し、経験を通じて成長し続けられる自分でありたいと思っています。困難な場面に直面した際にも、それを新たな学びや機会と捉え、自ら工夫しながら前向きに取り組むことで、自身の成長と周囲への価値提供の両立を実現していきたいと考えています。","impact":"人に喜んでもらうことを大切にしながら、自分自身も楽しんで取り組むことで、その姿勢が周囲にも伝わり、良い影響を広げていきたいと考えています。","vision_a":"地域経済発展への貢献により人々の生活を豊かにするとともに企業価値の向上","vision_b":"子供から高齢者までが住みやすく、活気ある町となること","vision_c":"他県にはない魅力ある県であり、住民だけでなく観光客や海外の方からも愛される街","vision_d":"日本の伝統や歴史を大切に継承・維持しながらも発展し続け、経済的に成長し続ける国になる","vision_e":"平和と自然の維持","growth":"・広い視野でアイデアを実現するチカラをつける\n・ビジョンやストーリーを語れるチカラ（言語化）をつけて説明できるようになる\n・ビジネス企画スキルの向上","future_self":"・自信をもってビジネス企画ができる状態\n・ビジョンや企画・戦略を周囲が共感できるように伝える説明力や言語化のスキルを身に着けた状態","challenges":"・ポジティブな人\n・銀行では出会えない人財や経験","insights":"","tags":["挑戦・行動","地域・福岡","社会貢献","成長・スキル","子ども・教育","笑顔・ポジティブ","ビジネス・起業","言語化・発信","平和・世界"]},{"name":"橋村俊一","category":"企業選抜","values":"身の回りに携わる方々の幸せを考えられる自分でありたい","impact":"信用し信頼される関係を築きたい","vision_a":"弊社が抱える8ヵ年計画の達成とその後の未来を構築","vision_b":"子供自身が明るい未来を持てるような教育サービスの提供","vision_c":"九州・沖縄地域のモデルとなるような子育て・教育","vision_d":"国際競争に負けない人財育成\n","vision_e":"国際平和と人種・文化の尊厳を再構築","growth":"新しいことや様々なことを創造するだけでなく行動・実証、反省・次の行動までを身に付けたい","future_self":"私の発言や考えがワクワク感があるもの\nそれに付いていきたいと思えるような実力と魅力を身に付けたい","challenges":"全く異なる職種の企業課題を解決する機会を多く経験したい","insights":"","tags":["挑戦・行動","地域・福岡","子ども・教育","笑顔・ポジティブ","平和・世界"]},{"name":"恒吉　優希菜","category":"企業選抜","values":"周りの人への感謝の気持ちを忘れず、様々なことに前向きに挑戦し続ける自分でいたい","impact":"笑顔を大切に、大変な時も周りの人たちに元気を与えられる存在でありたい","vision_a":"メンバーの志が高く、お互いに切磋琢磨し合える場所","vision_b":"教育熱心な場所　子どもたちが自然の中でのびのび遊べるような場所であって欲しい","vision_c":"日本で一番住みやすい県！(自然も食も文化も全部豊かに)","vision_d":"良き伝統を守りつつ、新しい技術の進歩で老若男女、不自由なく過ごせる場所","vision_e":"争いがなく、物資の支援、技術の提供などを通して、皆で豊かにしていける場所","growth":"・論理的思考力\n・本質的な課題を見つける力\n・チームマネジメント力","future_self":"自分の意見に自信を持つ！！！","challenges":"柔軟な考えを持った学生","insights":"普段の業務内容が全く違う方たちだったので、とても良い刺激になりました。","tags":["挑戦・行動","子ども・教育","笑顔・ポジティブ","リーダーシップ"]},{"name":"池崎バンジャマン太郎","category":"企業選抜","values":"私は「子どもが真ん中」「愛をもって人の可能性を信じること」を大切にしたいです。家庭環境や生まれ育った場所、過去の失敗によって、子どもの未来が決まってしまう社会ではなく、どんな子どもにも「自分は存在していい」「自分にもできる」と思える機会を届けたいです。\nまた、自分を犠牲にして誰かを救うのではなく、自分自身も家族も大切にしながら、仕事を通して人に愛を注ぎ、社会に価値を生み、きちんと利益も出せる人でありたいです。子どもたちから見て「こんな大人になりたい」「人生は自分で面白くできる」と思ってもらえるような、挑戦し続ける大人でありたいです。","impact":"私は、教育者として、そして将来は経営者として、子どもたちの人生に火をつける存在になりたいです。現場で子どもたちと接していると、コロナ禍以降、何かに挑戦する前からあきらめたり、スマホの中だけで世界が閉じていたりする子が増えているように感じます。\nだからこそ、自然体験、科学実験、探究活動、企業訪問、憧れる大人との出会いを通して、子どもたちを外の世界へ連れ出したいです。そして「世界は広い」「自分にもできる」「だから勉強してみよう」と内発的に思える子どもを増やしたいです。\n周囲には、教育は成績を上げるだけでなく、子どもの自己肯定感、挑戦する力、人生を切り拓く力を育てるものだという影響を与えたいです。","vision_a":"まずは現在関わっている学思館・熊本ゼミナールグループの中で、新しい教育事業を立ち上げたいです。学習塾、個別指導、通信制高校、南阿蘇の宿泊施設、福岡・熊本の教室網というグループの資産を活かし、子どもたちが外の世界と出会う「冒険型教育事業」を作りたいです。\n具体的には、理科実験、自然体験、探究活動、宿泊型キャンプ、企業との連携プログラムを組み合わせた「まなびばクエスト」のような事業を構想しています。これは単なる社会貢献ではなく、少子化時代における塾グループの次世代収益事業として育てたいです。\n会社の中では、既存の学習塾事業を守るだけでなく、新しい価値を生み出す社内起業家として、社員や講師にも「教育の可能性はもっと広い」と感じてもらえる存在になりたいです。","vision_b":"地域においては、家庭や学校だけでは得られない体験を子どもたちに届ける教育インフラを作りたいです。特に、家庭環境に課題がある子、ひとり親家庭の子、児童養護施設で暮らす子、勉強することが当たり前ではない環境にいる子どもたちに、社会や自然と出会う機会を届けたいです。\n地域の企業、学校、行政、福祉施設、子ども食堂、教育機関がつながり、子どもたちを支える仕組みを作ることが理想です。地域の大人たちが、子どもにとって「憧れられる大人」「信頼できる大人」として関わり、子どもが自分の人生をあきらめずに挑戦できる地域を作りたいです。\n地域全体で、子どもの挑戦と学びを応援する文化を育てたいです。","vision_c":"福岡では、学思館の教室網やこれまでの運営経験を活かし、冒険型教育事業の最初のモデルを作りたいです。福岡市近郊には多くの子どもたちがいますが、家庭環境や経済状況によって、自然体験、科学体験、探究活動、憧れる大人との出会いに差があると感じています。\n福岡の子どもたちを、教室の中だけでなく、街、企業、自然、社会へ連れ出し、「自分はこの世界に存在していい」「自分にもできる」と思える体験を届けたいです。\nまた、福岡の企業スポンサーと連携し、一般家庭向けの有料プログラムで収益を生みながら、支援が必要な子どもたちにも同じ機会を届ける仕組みを作りたいです。福岡を、教育格差と体験格差を乗り越える新しい教育モデルの出発点にしたいです。","vision_d":"日本全体では、子どもたちの「挑戦する力」と「自己肯定感」を育て直す教育が必要だと感じています。現代の子どもたちは、スマホやSNSによって情報には触れていますが、実際に自然や社会に出て、驚き、失敗し、挑戦し、認められる経験が不足しているように感じます。\n私は、学習塾の役割を単なる受験指導に閉じず、子どもたちが外の世界と出会い、学ぶ意味を見つける場へ広げたいです。自然科学、探究、体験、企業との出会い、社会課題への関心を通して、「勉強は自分の人生を広げるためにある」と感じられる子どもを増やしたいです。\n将来的には、福岡・熊本で作ったモデルを日本各地に広げ、家庭環境に左右されず、すべての子どもが挑戦できる社会に貢献したいです。","vision_e":"世界に対しては、子どもたちが国や環境の違いを超えて、自分の可能性を信じられる社会を作る一助になりたいです。私自身、フランスと日本のルーツを持ち、幼少期には人と違うことに悩んだ経験もあります。一方で、フランスの親戚たちは、距離があっても、どんな時でも愛を持って支えてくれました。\nその経験から、子どもにとって「自分は愛されている」「自分は存在していい」と感じられることが、挑戦する力の土台になると考えています。\nまずは日本国内の教育格差・体験格差に向き合いながら、将来的には海外の子どもたちともつながり、世界の子どもたちが互いに学び合える教育プログラムを作りたいです。世界のどこに生まれても、子どもが自分の人生をあきらめずに挑戦できる未来に貢献したいです。","growth":"NEO ACADEMIAでは、自分の中にある教育への思いや社会課題への問題意識を、実際に事業として成立する形に磨き込みたいです。私は現在、学思館・熊本ゼミナールグループの中で、将来的に経営を担う可能性がある立場にいると自覚しています。そのため、単なる理想論ではなく、収益性、組織づくり、スポンサー獲得、行政・企業連携、ブランド設計まで含めた事業構想力を高めたいです。\n特に、子どもの体験格差や教育格差に向き合いながら、自分自身や会社もきちんと利益を出し、持続可能に社会へ価値を届ける方法を学びたいです。そのためにビジョンを共有し同志をまとめる力や巻き込み力・チームビルディングの力を身に付けたいです。\nまた、異業種の経営者や挑戦者と出会うことで、自分の視野を広げ、子どもたちに「外の世界」を見せられる大人として成長したいです。","future_self":"私は、教育者としても経営者としても、子どもたちから「こんな大人になりたい」と思われる自分になっていたいです。自分の人生を犠牲にして誰かを助けるのではなく、自分自身も家族も大切にしながら、仕事を通して人を幸せにし、社会に価値を生み、きちんと利益も出せる人でありたいです。\n将来的には、学思館、そして熊本ゼミナールグループを、単なる学習塾グループではなく、子どもたちの人生を動かす教育インフラへ進化させたいです。\n気持ちとしては、愛を持って子どもに関わり続ける人でありたい。考え方としては、理想と現実、社会貢献と収益、子どもの未来と自分の家族の幸せを両立できる経営者でありたいです。行動としては、誰よりも挑戦し続け、新しい教育の形を実際に作る人になりたいです。","challenges":"・現在構想している「まなびばクエスト」のような冒険型教育事業を、実現可能な事業計画に落とし込みたいです。\n・自然科学、南阿蘇での宿泊体験、企業訪問、探究活動、子どもたちへの学習支援を組み合わせた教育モデルを磨きたいです。\n・自分一人の思いで終わらせず、多くの大人を巻き込み、子どもたちを外の世界へ連れ出す事業に育てたいです。\n・児童養護施設、ひとり親家庭、家庭環境に課題がある子どもたちにも、企業スポンサーを通じて体験機会を届ける仕組みを作りたいです。\n・社会貢献で終わらせるのではなく、一般家庭向けの有料プログラムや企業協賛によって、持続可能な収益モデルを構築したいです。\n・企業スポンサーを巻き込む提案力、事業計画力、ブランド設計力、組織づくりの力を高めたいです。\n・福岡・熊本から始め、将来的に日本各地へ広げられる教育事業の形を考えたいです。\n・地域や社会を本気で良くしようとしている経営者と出会いたいです。\n・同年代で情熱あふれる人とつながりたいです。\n・子ども支援、児童福祉、自然体験、科学教育、行政連携、企業CSRに詳しい人と出会いたいです。","insights":"自分自身の中で会社員として抑え込んでいたビジョンが一気にあふれてきました。グループでビジョンを共有する中で、自分がやりたいことは単なる教育事業や社会貢献活動ではなく、「子どもたちが外の世界と出会い、自分の存在や可能性を信じられるきっかけをつくること」なのだと改めて気づきました。\nまた、自分自身のこれまでの経験、幼少期に人と違うことに悩んだこと、阿蘇の自然の中で育ったこと、周囲の大人に支えられたこと、教育現場で多くの子どもたちと関わってきたことが、今のビジョンにつながっていると整理できました。\n一方で、ビジョンを突き詰めていく中で、思いだけでは継続できないことも実感しました。子どもたちに愛を注ぎ、挑戦する機会を届けるためには、収益性や組織づくり、企業スポンサーとの連携など、事業として持続可能な形にする必要があります。\n今回共有してみて、自分のビジョンは「誰かを支援する」だけではなく、「子どもたちが人生を面白くできると感じられる社会をつくること」だと感じました。そして、そのためには自分自身も挑戦し、成長し、子どもたちから憧れられる大人であり続けたいと思いました。","tags":["挑戦・行動","地域・福岡","人を巻き込む","社会貢献","成長・スキル","共創・つながり","子ども・教育","笑顔・ポジティブ","ビジネス・起業","平和・世界"]},{"name":"吉田颯太朗","category":"企業選抜","values":"生きる意味について小学生の頃からずっと考え続けていて、\n現状大切にしてる価値観は以下のものになります。\n\n能動的ニヒリズム、最大多数の最大幸福（功利主義）","impact":"自分のチームにいることで、\nその人の幸福の最大化の一助になりたい。","vision_a":"次代を見極め、迷わず未来を変える。","vision_b":"子育てがしやすい地域","vision_c":"日本を牽引する都市になり、その立場であり続けること。","vision_d":"何年先でも持続可能な国家であること。","vision_e":"世界平和","growth":"どんな環境でも求められる人材になる。","future_self":"安定志向すぎるところがあるので、\nチャレンジを楽しむ余裕を身に付けたい。","challenges":"頭のいい人、ポジティブ思考ができる人、議論のできる人、\n人生の意味についてよく考える人。","insights":"","tags":["挑戦・行動","地域・福岡","笑顔・ポジティブ","平和・世界"]},{"name":"萬木","category":"企業選抜","values":"自分の信念を貫き、偏見や対等な自分であり続けたい。","impact":"日本でもボランティア、動物愛護、里親等々、手を差し伸べる事が日常になる様な風景。","vision_a":"会社が医療系なので、患者一人一人にきちんとむきあう。","vision_b":"地域活動を通じて、子供からご高齢の方まで、助け合える街づくり。(縦のつながり)","vision_c":"○○無料化\n共働きも多いので、子供食堂への援助。(横のつながり)","vision_d":"手を差し伸べる事に躊躇しない様な国民性。","vision_e":"衣食住、当たり前にあり、ユニセフ団体が無くても良い様な世界。","growth":"普段関われない方々と関われるので、刺激になると思います。視野を広げる事からはじめます。","future_self":"「○○だったらいいのに」と口に出した事はあるのですが、実行に移したことがないので、少しでも実行にうつせたら。","challenges":"とにかく、いろんな方と話してみたい。","insights":"自分の思いを文字にできる事はすごい事だと感じた。ロードマップ、ビジョンが明確だった。","tags":["地域・福岡","共創・つながり","子ども・教育","平和・世界"]}]},{"id":"create","icon":"✨","title":"ビジネス・創造派","color":"#E91E8C","desc":"新しい価値・事業・文化をゼロから創ることが根底にある。自ら事業やブランドを立ち上げたい","members":[{"name":"野中信之介","category":"企業選抜","values":"「徹底した顧客視点」と「多角的な仮説構築」を大切にしたいと考えています。単にサービスを売るのではなく、お客さまの生活の背景にまで想像力を膨らませ、「お客さま自身も気づいていない本質的なニーズ」を言語化できる自分でありたいです。既存の枠組みに捉われず、常に「本当はこうじゃないか？」という問いを持ち続け、新しい価値の切り口を見つけ出せる存在を目指します。","impact":"私の強みである「発想力」と「仮説力」を活かし、周囲に「その視点はなかった」という新しい気づきやワクワク感を与えたいです。会議やプロジェクトにおいて、凝り固まった空気を変える一石を投じることで、チーム全体がより柔軟に、前向きに議論できる状態を作りたいと考えています。私の提案がきっかけで、周囲の人が自らの殻を破り、新しい可能性に目を向けるような「変化の触媒」となることが理想です。","vision_a":"「部署の壁を越え、一つのチームとして顧客体験を最大化させる組織」を目指します。現在所属するアップセル推進グループを起点に、縦割り社会の弊害を打破し、情報が滑らかに循環する「持ちつ持たれつ」の協力体制を構築したいです。各部署が部分最適ではなく、ARPUやLTVの最大化という共通の目的に向かって自律的に連携していきたいと考えています。","vision_b":"「点と点が線でつながり、地域全体の魅力が循環するエコシステム」の構築です。福岡市のような都市部だけでなく、周辺の自治体が持つ固有の観光資源や伝統文化が、デジタルや交通網を通じて有機的に結びつく姿を目指します。有名スポットに集中する観光客を周辺地域へと促し、特定の場所だけでなく地域全体が潤い、関係人口が増え続ける「広域連携型の豊かなコミュニティ」をビジョンとして掲げます。","vision_c":"「先進技術と、住みやすさ・伝統が共生するアジアを代表する持続可能モデル」です。（データセンター誘致など？）経済成長を加速させつつ、都市再開発による地価高騰などの課題に対しては、DXを活用した省人化や地方移住の促進でバランスを取っていければと考えます。都市部の利便性と、自然豊かな地域の担い手不足解消を両立させ、現役世代がどこでも豊かに暮らせる、日本を牽引する福岡県をビジョンとして掲げます。","vision_d":"「テクノロジーを使いこなしつつ、人の温もりや情緒を大切にする国にしたい・なってほしい」\n効率化だけを追うのではなく、デジタルを使って「余白」を作り、伝統や食、地域のコミュニティといった日本独自の豊かさを再定義・発信する国を確立できればと思っています。すべての国民が「この国に生まれてよかった」と心から思える、幸福度の高い社会をビジョンとして掲げます。","vision_e":"「ビジネスや政治の論理だけでなく、現場に生きる人々の「本当のニーズ」を最優先に考えた解決策が提示される世界になってほしい。」テクノロジーが一人ひとりの可能性を拡張し、世界中の誰もが自分の居場所と役割を持って輝ける状態をビジョンとして掲げます。","growth":"既存の枠組みや社内の慣習に疑問を持ち、それを建設的な破壊へと導く「圧倒的なスピード感」と「マイ function ini(s){const n=(s||'').replace(/[　\s（(].*/,'').trim();return n.length>=2?n[0]+n[n.length-1]:n[0]||'?'}
function isE(c){return c==='企業選抜'}

/* ===== OVERVIEW ===== */
function renderOv(){
  document.getElementById('pg-ov').innerHTML=`<div class="ov-grid">${THEMES.map((t,i)=>{
    const c=COLS[i], ms=t.members;
    const kwFreq={};
    ms.forEach(p=>(p.tags||[]).forEach(tg=>{kwFreq[tg]=(kwFreq[tg]||0)+1;}));
    const topKw=Object.entries(kwFreq).sort((a,b)=>b[1]-a[1]).slice(0,5).map(x=>x[0]);
    const avHtml=ms.slice(0,14).map(p=>`<div class="mini-av ${isE(p.category)?'av-e':'av-y'}" title="${p.name}">${ini(p.name)}</div>`).join('');
    const extra=ms.length>14?`<span style="font-size:.68rem;color:#444;margin-left:2px">+${ms.length-14}</span>`:'';
    return`<div class="ov-card" style="border-color:${c}44" onclick="goGroup('${t.id}')">
      <div class="ov-head">
        <div class="ov-icon-wrap" style="background:${c}1a">${t.icon}</div>
        <div><div class="ov-title" style="color:${c}">${t.title}</div>
        <span class="ov-cnt" style="background:${c}22;color:${c}">${ms.length}名</span></div>
      </div>
      <div class="ov-desc">${t.desc}</div>
      <div class="ov-kwrap">${topKw.map(kw=>{const tc=TAG_C[kw]||c;return`<span class="okw" style="background:${tc}18;color:${tc};border:1px solid ${tc}33">${kw}</span>`}).join('')}</div>
      <div class="ov-avs">${avHtml}${extra}</div>
    </div>`;
  }).join('')}</div>`;
}

let selGs=new Set(), srch='';
function renderGd(){
  const el=document.getElementById('pg-gd');
  const allBtn=`<button class="gb${!selGs.size?' on':''}" style="${!selGs.size?'background:#e8ff001a;color:#e8ff00;border-color:#e8ff00':''}" onclick="clrG()">全て表示</button>`;
  const btns=THEMES.map((t,i)=>{const c=COLS[i];const on=selGs.has(t.id);return`<button class="gb${on?' on':''}" style="${on?`background:${c}1a;color:${c};border-color:${c}`:''}" onclick="togG('${t.id}')">${t.icon} ${t.title} <span style="opacity:.5;font-size:.68rem">${t.members.length}</span></button>`;}).join('');
  const sw=`<div class="sw"><input type="text" placeholder="名前・キーワードで検索…" value="${srch}" oninput="onSrch(this.value)"></div>`;
  let total=0, secs='';
  THEMES.forEach((t,i)=>{
    if(selGs.size&&!selGs.has(t.id)) return;
    const c=COLS[i];
    const fl=t.members.filter(p=>{
      if(!srch) return true;
      const q=srch.toLowerCase();
      return Object.values(p).some(v=>typeof v==='string'&&v.toLowerCase().includes(q));
    });
    if(!fl.length) return;
    total+=fl.length;
    const cards=fl.map(p=>{
      const ie=isE(p.category);
      const tags=(p.tags||[]).slice(0,4).map(tg=>{const tc=TAG_C[tg]||c;return`<span class="mtag" style="background:${tc}15;color:${tc};border:1px solid ${tc}30">${tg}</span>`;}).join('');
      const pj=JSON.stringify(p).replace(/\\/g,'\\\\').replace(/'/g,"\\'");
      const tj=JSON.stringify(t).replace(/\\/g,'\\\\').replace(/'/g,"\\'");
      return`<div class="mc" style="border-left:3px solid ${c}55" onclick='openM(${JSON.stringify(p)},${JSON.stringify(t)})'>
        <div class="mc-top"><div class="mav ${ie?'av-e':'av-y'}">${ini(p.name)}</div>
        <div><div class="mname">${p.name}</div><span class="mcat ${ie?'av-e':'av-y'}">${p.category}</span></div></div>
        ${p.values?`<div class="mval">${p.values}</div>`:''}
        <div class="mtags">${tags}</div></div>`;
    }).join('');
    secs+=`<div class="gsec"><div class="ghd" style="background:${c}0f;border:1px solid ${c}22">
      <span class="g-icon">${t.icon}</span><span class="g-title" style="color:${c}">${t.title}</span>
      <span class="g-cnt" style="background:${c}22;color:${c}">${fl.length}名</span>
      <span class="g-desc">${t.desc}</span></div>
      <div class="mgrid">${cards}</div></div>`;
  });
  el.innerHTML=`<div class="gd-top">${allBtn}${btns}${sw}<span class="gd-count">${total}名表示</span></div>${secs||'<p class="no-r">該当なし</p>'}`;
}
function togG(id){selGs.has(id)?selGs.delete(id):selGs.add(id);renderGd();}
function clrG(){selGs.clear();renderGd();}
function onSrch(v){srch=v;renderGd();}
function goGroup(id){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('on'));
  document.querySelectorAll('.pg').forEach(p=>p.classList.remove('on'));
  document.querySelector('[data-tab="gd"]').classList.add('on');
  document.getElementById('pg-gd').classList.add('on');
  selGs.clear();selGs.add(id);renderGd();
}

/* ===== WORDMAP ===== */
function renderWm(){
  const el=document.getElementById('pg-wm');
  const max=WORDS[0].n;
  const cloud=WORDS.map(({w,n},i)=>{
    const sz=Math.round(11+n/max*26);
    const c=WCOLS[i%WCOLS.length];
    return`<span class="ww" style="font-size:${sz}px;color:${c};background:${c}15" title="${n}名">${w}<sup style="font-size:.5rem;margin-left:1px;opacity:.55">${n}</sup></span>`;
  }).join('');
  const rows=WORDS.map(({w,n},i)=>{
    const pct=Math.round(n/76*100);
    const c=WCOLS[i%WCOLS.length];
    return`<div class="rrow"><span class="rw" style="color:${c}">${w}</span><div class="rbar"><div class="rfill" style="width:${pct}%;background:${c}"></div></div><span class="rnum">${n}名 (${pct}%)</span></div>`;
  }).join('');
  el.innerHTML=`<div style="margin-bottom:2rem"><div class="wm-h2">キーワードの大きさ＝登場人数（全76名中）</div><div class="wordcloud">${cloud}</div></div><div><div class="wm-h2">キーワード別 登場人数ランキング</div><div class="rank-list">${rows}</div></div>`;
}

/* ===== MODAL ===== */
function sec(lbl,txt){
  if(!txt||!txt.trim()) return '';
  return`<div class="ms"><div class="ms-lbl">${lbl}</div><div class="ms-txt">${txt}</div></div>`;
}
function openM(p,t){
  const ie=isE(p.category);
  const c=TM[t.id]?.c||'#e8ff00';
  document.getElementById('m-av').className='m-av '+(ie?'av-e':'av-y');
  document.getElementById('m-av').textContent=ini(p.name);
  document.getElementById('m-nm').textContent=p.name;
  const mth=document.getElementById('m-th');
  mth.textContent=`${t.icon} ${t.title}`;mth.style=`background:${c}1a;color:${c}`;
  let h='';
  h+=sec('価値観・ありたい自分',p.values);
  h+=sec('周りへ与えたい影響',p.impact);
  const vs=[{k:'vision_a',l:'A 身近な関係性'},{k:'vision_b',l:'B 地域'},{k:'vision_c',l:'C 福岡県'},{k:'vision_d',l:'D 日本'},{k:'vision_e',l:'E 世界'}];
  const vr=vs.filter(v=>p[v.k]&&p[v.k].trim()).map(v=>`<div class="vi"><div class="vi-l">${v.l}</div><div class="vi-t">${p[v.k]}</div></div>`).join('');
  if(vr) h+=`<div class="ms"><div class="ms-lbl">ビジョン（A〜E）</div><div class="vgd">${vr}</div></div>`;
  h+=sec('NEO ACADEMIAで成長したいこと',p.growth);
  h+=sec('なりたい自分',p.future_self);
  h+=sec('挑戦したいこと・出会いたい人',p.challenges);
  h+=sec('グループ共有での気づき',p.insights);
  const tags=(p.tags||[]).map(tg=>{const tc=TAG_C[tg]||c;return`<span class="tg" style="background:${tc}15;color:${tc};border:1px solid ${tc}33">${tg}</span>`;}).join('');
  if(tags) h+=`<div class="ms"><div class="ms-lbl">タグ</div><div class="tag-row">${tags}</div></div>`;
  document.getElementById('m-bd').innerHTML=h||'<p style="color:#444">記載なし</p>';
  document.getElementById('mbg').classList.add('on');
  document.body.style.overflow='hidden';
}
document.getElementById('mx').onclick=()=>{document.getElementById('mbg').classList.remove('on');document.body.style.overflow='';};
document.getElementById('mbg').onclick=e=>{if(e.target===document.getElementById('mbg')){document.getElementById('mbg').classList.remove('on');document.body.style.overflow='';}};
document.addEventListener('keydown',e=>{if(e.key==='Escape'){document.getElementById('mbg').classList.remove('on');document.body.style.overflow='';}});

白さ、チャレンジできる環境があったからこそ魅力に感じました。そういった事業を私の力でも創造していきたいと考えています。"},{"name":"倉光志歩","category":"ユース選抜","text":"地域の協力によって出来るわけのないの否定をしない想いを殺さない教育の未来"},{"name":"中山陽友","category":"企業選抜","text":"豊かな地元の食材を扱う商店や飲食店のように、その土地の文化や歴史が大切にされる地域。"},{"name":"恒吉　優希菜","category":"企業選抜","text":"教育熱心な場所　子どもたちが自然の中でのびのび遊べるような場所であって欲しい"},{"name":"山内傳太郎","category":"企業選抜","text":"地域の課題を地域で解決できる、老若男女の生活が活発な地域"},{"name":"松井克之","category":"ユース選抜","text":"自分の特性を活かすことができる場、挑戦しやすいが増える。"},{"name":"大原久弥","category":"企業選抜","text":"（久留米）福岡市に負けず、もっと人を呼び込めるような地域。"},{"name":"小野萌子","category":"企業選抜","text":"行きやすい隣町のように親しみがあって温かい地域"},{"name":"中村綾音","category":"ユース選抜","text":"糸島を、人が集まる刺激的な田舎にしたい。"},{"name":"木村友大","category":"企業選抜","text":"様々なソリューションを行い、地域を盛り上げられる企業また、個人としても知名度がある状態"},{"name":"池田えり","category":"企業選抜","text":"住んでいる人が地域の良いところを5つ言える"},{"name":"岩崎俊太","category":"ユース選抜","text":"研究者が充実した毎日を遅れる町"},{"name":"山本秀太","category":"企業選抜","text":"挑戦する人を応援し、若い世代がチャレンジしやすい活気ある地域にしたい。"},{"name":"太田圭吾","category":"ユース選抜","text":"若者と企業の力を掛け合わせて地域を盛り上げる。"},{"name":"天野総太","category":"企業選抜","text":"商店街のような地域密着できる場所と、コンビニや商業施設等の利便性高い場所が両立できる地域を維持、活性化したい。"},{"name":"小畑　敏力","category":"企業選抜","text":"活気のあるイベントや行事ができればいい"},{"name":"吉田　奈緒子","category":"企業選抜","text":"人と人とが繋がり、お互い助け合える交流が広がりバブルアップできるコミュニティがあると楽しそう。"},{"name":"松下遼","category":"企業選抜","text":"固有のものを大切にしつつ利便性を上げる"},{"name":"池崎バンジャマン太郎","category":"企業選抜","text":"地域においては、家庭や学校だけでは得られない体験を子どもたちに届ける教育インフラを作りたいです。特に、家庭環境に課題がある子、ひとり親家庭の子、児童養護施設で暮らす子、勉強することが当たり前ではない環境にいる子どもたちに、社会や自然と出会う機会を届けたいです。\n地域の企業、学校、行政、福祉施設、子ども食堂、教育機関がつながり、子どもたちを支える仕組みを作ることが理想です。地域の大人たちが、子どもにとって「憧れられる大人」「信頼できる大人」として関わり、子どもが自分の人生をあきらめずに挑戦できる地域を作りたいです。\n地域全体で、子どもの挑戦と学びを応援する文化を育てたいです。"},{"name":"西原鷹太（ニシハラヨウタ）","category":"ユース選抜","text":"大濠公園のように自然と触れ合いながらランニングや散歩を楽しむ人がいっぱいの地域にしたい。"},{"name":"伊東大樹","category":"企業選抜","text":"環境の美しさを当たり前とせず、それを支えている人への意識やリスペクトが共有される地域が理想です。\nその積み重ねが、住みやすい地域の環境に繋がると考えます。\nその為、もっと周りの当たり前の事にも意識を向けてリスペクトできる環境になったらいいと思います。"},{"name":"黒瀬　継太","category":"企業選抜","text":"町が活気で溢 ory":"企業選抜","text":"ありのままをいきるひとが増える"},{"name":"向井慶介","category":"企業選抜","text":"他事業者をまきこむ"}]},{"field":"vision_c","label":"C 福岡県のビジョン","answers":[{"name":"畑山大志","category":"企業選抜","text":"九州で一番盛り上がりたい"},{"name":"西岡恭侑","category":"ユース選抜","text":"東京や大阪に遅れをとらない、西日本の東京と言われるぐらい、経済、にぎわい、楽しさ幸せで溢れるいい街にしたい。"},{"name":"木下　紗希","category":"企業選抜","text":"他県にはない魅力ある県であり、住民だけでなく観光客や海外の方からも愛される街"},{"name":"渕脇大翔","category":"ユース選抜","text":"築き上げてきた産業や技術を時代に合わせた形で発展させより魅力ある福岡で多くの人が暮らし続ける！"},{"name":"吉田将吾","category":"ユース選抜","text":"福岡が「新しいことを始めたい」と願う人にとって最も挑戦しやすい街であってほしいと考えます。新しいことをする環境が自然と生まれ福岡の人達それぞれが盛り上がる未来を作りたいです。"},{"name":"上田啓太","category":"企業選抜","text":"地域インフラの課題が解決し、それに伴う高齢者や子育て世代へのケアや課題解決に繋がればいい。"},{"name":"苅北沙絢","category":"ユース選抜","text":"国内外の人が集まりやすく、誰にとっても居心地の良い地域"},{"name":"荒口航","category":"ユース選抜","text":"もっと多くの都市から人が移り住み、地域全体がさらに活気づいてほしい"},{"name":"小場川千花子","category":"ユース選抜","text":"今も、福岡の熱量はすさまじいけど、大学生だけじゃなくて、もっと中高生とかを巻き込めると面白そう。"},{"name":"三坪煌","category":"ユース選抜","text":"ものづくりに関わりたいと思う学生がもっと増えたらいいと思う。"},{"name":"田畑紗那","category":"企業選抜","text":"若年層がこの県のために働きたいと思える県\n就職の際に都心に流れていく人たちも多い中で、この県のために働きたいと思える人を育て、それがさらに福岡が良くなるきっかけになると思いました。"},{"name":"松本大地","category":"ユース選抜","text":"大学の進学先で上のレベルになると福岡出身の人が関東　関西に行きがちなので、福岡出身の人が福岡に残ったり、東北や関東　関西からわざわざ福岡に進学してきたりするほどの学問と魅力の発展。大阪に並ぶ副首都。"},{"name":"野中信之介","category":"企業選抜","text":"「先進技術と、住みやすさ・伝統が共生するアジアを代表する持続可能モデル」です。（データセンター誘致など？）経済成長を加速させつつ、都市再開発による地価高騰などの課題に対しては、DXを活用した省人化や地方移住の促進でバランスを取っていければと考えます。都市部の利便性と、自然豊かな地域の担い手不足解消を両立させ、現役世代がどこでも豊かに暮らせる、日本を牽引する福岡県をビジョンとして掲げます。"},{"name":"渡邊詩麻","category":"ユース選抜","text":"まだ考えられてない"},{"name":"橋村俊一","category":"企業選抜","text":"九州・沖縄地域のモデルとなるような子育て・教育"},{"name":"茂山和寛","category":"ユース選抜","text":"「たまたま隣にいた」っていう偶然の出会いを、若者の挑戦の文化に変えて、そこに大人の応援と遊び心が混ざり合っていく。そんな福岡らしいオープンな熱量を、キャンパスの中だけで終わらせずに、この街全体の日常にワクワクとして溶け込ませていきたい。"},{"name":"平田匠","category":"ユース選抜","text":"福岡を代表する食品にする"},{"name":"井手壱彩","category":"ユース選抜","text":"やりたいことを語り挑戦する人が集まり、その価値観を発信する拠点として福岡をつくる"},{"name":"大宅花奈","category":"ユース選抜","text":" 会を作り上げる。"},{"name":"飯森航大","category":"企業選抜","text":"・未来に希望を持てる社会。\n・分断ではなく共創する社会。\n・誰も取り残さない社会でありたい。（地方の過疎化、医療、教育等）"},{"name":"久保山亜美","category":"企業選抜","text":"【世の中に残っているいい会社が、”人”の問題で諦めなくていい日本にしたい】\n\n普段、人事採用の仕事をしておりますが、今の時代は人材を確保することが難しく、せっかく世の中にとって必要な事業をしているのに「人が採れない」という理由だけで会社を畳まざるを得ないケースもあるかと思います。そこで働いている従業員の方たちの幸せな状態をなくしてしまうことは悲しいことだと感じております。\n\n私は、世の中の企業の方たちが夢や志をあきらめることなく、採用の側面からサポートをし、その幸せを作り続けられたら素敵だなと思います。\n\nそのために、今の自分に足りない知識や冷静な判断力をしっかり磨いていきたいです。\n採用の力で会社に活力を与え、そこで働く人たちが「この会社で良かった！」と思えるように、自分にできることを最大限できる自分になりたいです！"},{"name":"原口知佳","category":"ユース選抜","text":"日本の良さを国内だけでなく海外にも広げたいです。観光や体験を通して、日本の文化や魅力が正しく伝わる状態を作りたいと考えています。"},{"name":"今村大智","category":"ユース選抜","text":"挑戦することを皆が応援しようと思う日本"},{"name":"東原陽世","category":"ユース選抜","text":"遅れている技術力を高めてAI時代で世界を牽引できるような国"},{"name":"松下優司","category":"ユース選抜","text":"日本人であることに誇りを持つ。リスペクトされる。"},{"name":"柴田梨愛","category":"ユース選抜","text":"地方を活性化させ、環境を守りながらも経済を発展させる"},{"name":"永岡　大寿","category":"企業選抜","text":"少子高齢化が進み、私が知っている企業の方も人手不足に難儀している状況があります。\nこれらの状況を変える一助となれるようにと思っています。"},{"name":"吉田颯太朗","category":"企業選抜","text":"何年先でも持続可能な国家であること。"},{"name":"笹川嵩孔","category":"企業選抜","text":"日本の伝統と文化を研ぎ澄まし、世界と共有し刺激を受け進化し続けてほしい"},{"name":"中村亮太","category":"企業選抜","text":"志を持って世界に挑む"},{"name":"岡松倭","category":"企業選抜","text":"仕事に対してのマインドの変革\n\nただお金を稼ぐのが仕事ではないということ。より豊かな人生にし社会通念に囚われず自己改革に励むような人や企業を一個でも多く作りたい"},{"name":"萬木","category":"企業選抜","text":"手を差し伸べる事に躊躇しない様な国民性。"},{"name":"篠原隆太郎","category":"企業選抜","text":"活気のある場所にしたい"},{"name":"椎葉良輝","category":"企業選抜","text":"多くの人がありのままの自分を発揮し、他者に貢献することを楽しんでいる\n豊かさを世界に届ける"},{"name":"向井慶介","category":"企業選抜","text":"挑戦できる人が多くなるような文化"}]},{"field":"vision_e","label":"E 世界のビジョン","answers":[{"name":"畑山大志","category":"企業選抜","text":"世界一で一番魅力的な町にしたい"},{"name":"西岡恭侑","category":"ユース選抜","text":"戦争や環境汚染などのない、幸せで、未来のある少しでも1人でも幸せな人が多い未来にしたい。"},{"name":"木下　紗希","category":"企業選抜","text":"平和と自然の維持"},{"name":"渕脇大翔","category":"ユース選抜","text":"それぞれの文化を尊重し助け合える世界"},{"name":"吉田将吾","category":"ユース選抜","text":"世界平和。\n\n自分のお笑いが世 :"企業選抜","text":"既存の枠組みや社内の慣習に疑問を持ち、それを建設的な破壊へと導く「圧倒的なスピード感」と「マインドセット」を習得したいです。単なるスキルの習得に留まらず、インフラ企業という安定した土壌にありながら、スタートアップのような機動力を持って変革を推進できる人材へと成長したいです。"},{"name":"渡邊詩麻","category":"ユース選抜","text":"​物事をパターン化して、蓄える能力（知識を得る、​様々な事から共通項を見つける能力、​ムードメーカー力。きついときにいかに苦しそうな顔を見せないか。"},{"name":"橋村俊一","category":"企業選抜","text":"新しいことや様々なことを創造するだけでなく行動・実証、反省・次の行動までを身に付けたい"},{"name":"茂山和寛","category":"ユース選抜","text":"自分を大きく見せない\n承認欲求で意思決定しない\n自ら問いを立てかつ前提を超える事\n会社との関係の気づき方、コミュニケーションの取り方を習得する"},{"name":"平田匠","category":"ユース選抜","text":"・お金に困らない状態にもっていく\n・AIをもっと使いこなす\n・人を集められる存在になる"},{"name":"井手壱彩","category":"ユース選抜","text":"これまでの行動経験をもとに、人の心が動く環境の中で、他者の行動を生み出す力を身につけるとともに、その要因を分析できる力を高めたいです。"},{"name":"大宅花奈","category":"ユース選抜","text":"プロジェクトを成功させ、福岡の若者にいい影響を与えるための過程で、「他者貢献」や「リーダーシップ」に対する解像度をもっと上げたい。"},{"name":"堀口真大朗","category":"ユース選抜","text":"人と話すことが当たり前になりたい\n後悔する自分にならないために挑戦心を持ち続ける\n人と出会う中で自分を深め、今までの偏見を変えて価値観を発展させたい"},{"name":"前山 奈央","category":"企業選抜","text":"NEO ACADEMIAを通じて、私は視座を上げる成長をしたいです。\n\nこれまでは、ECやマーケティングの現場で、数字を見ながら改善を積み重ねることに力を注いできました。\n今後はそこに加えて、\n\n自分の想いを言語化する力\n人を巻き込む力\n社会や地域とのつながりの中で価値を構想する力\nを伸ばしたいと思っています。\nまた、正解を探すだけでなく、自分なりの問いを持ち、ビジョンを語れる人間になりたいです。\n実務家としての強さに加えて、未来をつくる側の視点を持てるよう成長したいです。"},{"name":"法兼佑樹","category":"ユース選抜","text":"アクティブに動くだけではなく、成し遂げる力を身に着け、人々を動かす際の管理能力やビジネス的な視点を持つような成長"},{"name":"相良七海","category":"ユース選抜","text":"・多くの人を巻き込んで、何かを成し遂げられるような人間になりたい\n・戦略を立てて企画を立ち上げ、目的を達成できるようになりたい\n・プロジェクトを通して経営力を身につけたい"},{"name":"中山一樹","category":"企業選抜","text":"「やってみる」をマインドにして、それをBe playfulへ成長させる"},{"name":"城川士道","category":"ユース選抜","text":"自分の理想を具体化させ人に自信を持って話せるようになり、既存のものに引っ張られず常に自分が求める理想を考えるイノベーター的な思考を持てる様になりたい。"},{"name":"藤松拓実","category":"ユース選抜","text":"ビジネスの具体性を高めてみれるようになる。"},{"name":"倉本佳史","category":"企業選抜","text":"誰かをワクワクさせられるようなことを考え、人を巻き込んでいくような企画ができるようにしていきたい。"},{"name":"山下　直矢(ヒューベストホールディング株式会社)","category":"企業選抜","text":"①チームで協働するマネジメント力を学びたい\n②リーダーとして周りのメンバーを引っ張っていく力(巻き込み力)\n③勝ち筋を描く力→ビジョン達成の為に課題に向き合い突破する為のアイデアを創造したい\n④今以上に失敗を恐れず、前向きに取り組むポジティブマインドを伸ばしたい"},{"name":"倉光志歩","category":"ユース選抜","text":"周りを自分のやりたい事に巻き込むこと\n自分の言葉が相手に伝わる話し方になること\n計画したことやると決めたことは必ず行動に移すこと"},{"name":"中山陽友","category":"企業選抜","text":"私の癖として、枠の中にあるものを使って最善のものを最短で作ろうとしてしまいます。ですがそれでは、革新的なアイデアは生まれないと感じています。なのでNEOでは、仲間と意見を出し合い、立ち止まる時間や寄り道する時間も大事にし、枠を超えた発想を出来る人間に成長したいと思っています"},{"name":"恒吉　優希菜","category":"企業選抜","text":"・論理的思考力\n・本質的な課題を見つける力\n・チームマネジメント力"},{"name":"山内傳太郎","category":"企業選抜","text":"自身の行動により周りの人が最大限力を発揮できるようなポジティブを振りまけるようなスキル"},{"name":"松井克之","category":"ユース選抜","text":"①他人の心を動かすデザインができる\n②多角的な視点から物事を見ることができる\n③限界な時でも笑顔"},{"name":"大原久弥","category":"企業選抜","text":"・既存の枠組みにとらわれず、挑戦できる。\n・好奇心を持ち、もう一歩を踏み出せるようになる。\n・周囲の人を尊重して、目的達成のために巻き込める。"},{"name":"小野萌子","category":"企業選抜","text":"現時点で主に、人の話を聞き見通しを立てて実行するという部分が自分にかけている部分だと思っている。周りの話を偏りなく聞いたうえで客観的に物事の解決策を提案することのできる能力（どんな時も落ち着いている？）を身に着けたい。"},{"name":"中村綾音","category":"ユース選抜","text":"•行動のハードルをゼロにしたい。\n•継続的に組織を動かせるようになりたい。(自分もメンバーも幸せで、かつ、組織の目的も果たせたいる状態をつくれるようになりたい)\n•壁にぶつかっても立ち向かい続けられるようになりたい。"},{"name":"木村友大","category":"企業選抜","text":"思考を言語化し、多角的視点から考えたことを相手にわかりやすく伝えられる\nやらない後悔より挑戦できるマインド"},{"name":"池田えり","category":"企業選抜","text":"ポジティブマインドを得る。他者を巻き込む力を身につける。"},{"name":"岩崎俊太","category":"ユース選抜","text":"挑戦楽しみながら、どんどんしていける人\nリーダーシップを持った人\n学習し続けられる人"},{"name":"山本秀太","category":"企業選抜","text":"理論だけでなく実践を通じて行動力と巻き込み力を高め、経験を自分の言葉で語れるようになりたい。"},{"name":"太田圭吾","category":"ユース選抜","text":"強みを増やしたい。\nやりたいことを見つけたい。\nオンリーワンになりたい。"},{"name":"天野総太","category":"企業選抜","text":"・自分自身の発言、行動に自信を持ちたい\n・受身から主体性のマインドになりたい"},{"name":"小畑　敏力","category":"企業選抜","text":"・最後までやり遂げる実行力を身につけたい\n・他人をリスペクトする気持ちを忘れない\n・笑顔で楽しんでやるマインドを身につける"},{"name":"吉田　奈緒子","category":"企業選抜","text":"・好奇心を持ち、今mでの固定観念を取っ払い「どうやったらできるか」を考え、行動する力をつけたい。\n・仲間を巻き込み、現場実行力を上げ、チームで成果を出せるマネジメント力をつけたい。"},{"name":"松下遼","category":"企業選抜","text":"経験を生かした新規事業をバンバン作りたい\n自分の能力を活かす道"},{"name":"池崎バンジャマン太郎","category":"企業選抜","text":"NEO ACADEMIAでは、自分の中にある教育への思いや社会課題への問題意識を、実際に事業として成立する形に磨き込みたいです。私は現在、学思館・熊本ゼミナールグループの中で、将来的に経営を担う可能性がある立場にいると自覚しています。そのため、単なる理想論ではなく、収益性、組織づ
