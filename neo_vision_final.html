egory":"企業選抜","text":"できない理由をみつけない、できる理由を見つける"}]},{"field":"challenges","label":"挑戦・出会いたい人","answers":[{"name":"畑山大志","category":"企業選抜","text":"いろんな人を巻き込みたい"},{"name":"西岡恭侑","category":"ユース選抜","text":"自分と考え方が違う人といっぱい話したい。同じ想いを持った仲間とその実現に取り組む経験をしたい。"},{"name":"木下　紗希","category":"企業選抜","text":"・ポジティブな人\n・銀行では出会えない人財や経験"},{"name":"渕脇大翔","category":"ユース選抜","text":"実際に企業がアイデアを社会実装するまでのプロセスを学びたい"},{"name":"吉田将吾","category":"ユース選抜","text":"多様なバックグラウンドを持つ人々と出会い、その体験談を吸収することで、自分の人生の指針となる「解」を見つけたいです。自分にはない視点を持つ人との対話を通じて、やりたいことを明確にし、実行に移すためのマインドセットを学びたいです。"},{"name":"上田啓太","category":"企業選抜","text":"独創的な視点をお持ちの方と出会いたい。"},{"name":"苅北沙絢","category":"ユース選抜","text":"自分の行動で人を喜ばせる\n自分にはない考え方や価値観を持つ人と交流する\n海外に興味を持つ人や実際に海外経験のある人と交流する"},{"name":"荒口航","category":"ユース選抜","text":"経験したいこと:プロジェクトリーダー\n出会いたい人:コミュ力高い人、行動力のある人、起業経験のある人"},{"name":"小場川千花子","category":"ユース選抜","text":"なにか一つでもいいから、全力でやり切ってみる。\nたくさんの人のお話を聞いてそのことについてちゃんと対話してみたい。\n本気で人とぶつかってみたい。"},{"name":"三坪煌","category":"ユース選抜","text":"・事業を続けている経営者の考え方を学ぶ\n・ものづくり企業の現場を見る\n・企画から集客、運営までやり切る\n・率直に指摘してくれる大人や、本気の仲間と出会う"},{"name":"田畑紗那","category":"企業選抜","text":"・参加している人全員と話す！\n・NEOの集まりの前に自分のなりたい姿を確認し、意識をして1つ1つのことに取り組む\n・様々な人と話をする！"},{"name":"松本大地","category":"ユース選抜","text":"企業などで人望が厚く周りを巻き込むようなカリスマ性がある人と話して取り入れたい。こんな学園祭をしたいなどはっきりした目標がある人と関わって、きっかけや熱意を感じたい。年齢も経歴も価値観も違う人と話して自分の価値観を壊したい。言語化能力をつけるため、会議などで発言の回数を増やしたい。"},{"name":"野中信之介","category":"企業選抜","text":"・「顧客の潜在ニーズ（仮説）から、具体的で実現可能な事業モデルへと落とし込む」一連のプロセスと手法の習得。\n・自分のアイデアを多角的な視点（講師や他業界の参加者）から揉まれ、ブラッシュアップされる経験。\n・全く異なる業界で、自分にはない視点や圧倒的なスピード感で動いている同世代の旗振り役。"},{"name":"渡邊詩麻","category":"ユース選抜","text":"​新しいことに巻き込まれたり巻き込んだりを繰り返したい。\n​会話が一生続いている人\n​ムードメーカー的役割の人"},{"name":"橋村俊一","category":"企業選抜","text":"全く異なる職種の企業課題を解決する機会を多く経験したい"},{"name":"茂山和寛","category":"ユース選抜","text":"自分をロールモデルをコンセプトに自分なりのクリエイティブ系に昇華する"},{"name":"平田匠","category":"ユース選抜","text":"・今のプロジェクトに対し、ブーストできる企業、個人を見つける\n・スタートアップと胸を張って言えるようなプロジェクトに育て上げる"},{"name":"井手壱彩","category":"ユース選抜","text":"挑戦したいこと\n人の「やりたい」を引き出し、行動につなげる企画の実行\n\n経験したいこと\n人の心が動く瞬間を体感し、その要因を分析する経験\n\n出会いたい人\n 人の行動を生み出している実践者"},{"name":"大宅花奈","category":"ユース選抜","text":"・自分とは違ういろいろなバックグラウンドを持つ人とたくさん話して、価値観のアップデートをしつづけたい。\n・人見知りの心を捨てて、いろんな人に話しかける！"},{"name":"堀口真大朗","category":"ユース選抜","text":"多様な経験を持っている人と話したい\n企業の方々に質問したい\nチームとなって課題解決を行うこと\n自分について話せるようになりたい"},{"name":"前山 奈央","category":"企業選抜","text":"・自分のビジョンや想いを、人に伝わる言葉で話す挑戦\n・会社や地域の未来について、普段の業務を超えた視点で考える経験\n・自分とは異なる業界・立場・価値観を持つ人との対話\n・すでに地域で挑戦している実践者との出会い\n・事業づくりや地域づくりを本気で進めているリーダーとの出会い\n・自分の固定観念を壊されるような経験\n・小さくてもいいので、自分発信で何かを形にする挑戦\n・仲間と本音で話し、互いに刺激し合える関係づくり\n・マーケティングやECの枠を超えて、社会や地域課題に触れる経験\n・行動量だけでなく、視座や器を広げる学び\n・将来的に一緒に何かを仕掛けられる仲間との出会い"},{"name":"法兼佑樹","category":"ユース選抜","text":"事業を現実にし、動き出した人\nわくわくするビジョンを持った人\n夢を形にする中で様々な苦労や挫折があった人\nビジョンからやるべきことを逆算し、実践した人"},{"name":"相良七海","category":"ユース選抜","text":"・自分の改善ポイントを見つけて伝えてくれる人\n・自分の当たり前を塗り替えられるような経験をしたい"},{"name":"中山一樹","category":"企業選抜","text":"自分の経験のない領域で新しい発見やアイディアを見つけていくこと"},{"name":"城川士道","category":"ユース選抜","text":"自分の思いを形として社会に出す経験をしたい。"},{"name":"藤松拓実","category":"ユース選抜","text":"同世代の仲間、企業の意思決定者、新卒人事の方に出会いたい。"},{"name":"倉本佳史","category":"企業選抜","text":"地域のために必要なことを考えることが仕事に直結するなど、地域活性化に携わっている方の話を聞いてみたい。"},{"name":"山下　直矢(ヒューベストホールディング株式会社)","category":"企業選抜","text":"①これからのプロジェクトにおいてチームワークが求められると考え、なるべく早く班員と仲良くなり自身の固定概念ではなく、多くの価値観を吸収していきたい。\n\n②これから組織を引っ張れる立場、そして社員一人一人のマネジメントができるリーダーになりたいと考えている為、マネジメント経験がある人と出会いたい\n\n③経営者になりたいと現時点では思っていないからこそ、さまざまな経営者の方々の大事にしている思い、価値観を吸収して経営に対して興味を持ちたい！\n\n④企業の経営課題と向き合い、新たな事業戦略、改善案を創造できる経験を積みたい"},{"name":"倉光志歩","category":"ユース選抜","text":"自分のふわふわした考えを言語化して説明できる人\n福岡に埋もれているアーティストのアートイベントがやりたい。"},{"name":"中山陽友","category":"企業選抜","text":"・プロジェクトを引っ張っていくリーダーをやりたい\n・チームで何かを最後までやり抜く経験がしたい\n・自分にはない、枠を飛び出した発想を得意とする人に出会いたい\n・業界を作ってきた先駆者との繋がりを作る"},{"name":"恒吉　優希菜","category":"企業選抜","text":"柔軟な考えを持った学生"},{"name":"山内傳太郎","category":"企業選抜","text":"・即行動できる人\n・難しいことでも工夫して乗り越える経験"},{"name":"松井克之","category":"ユース選抜","text":"・お笑い芸人\n・キャリアに携わっている人\n（自己理解をサポートしたり、挑戦の場を作っている人）"},{"name":"大原久弥","category":"企業選抜","text":"・実務に即した、地に足のついたプロジェクトを完遂する。\n・会社の枠を超えたコミュニティを作る。\n・今後も心から目標にしたいような、魅力のある大人に出会う。\n・「自分ごと」として、当事者意識を持てるようになる。"},{"name":"小野萌子","category":"企業選抜","text":"ポジティブな言葉を出せる人と出会いたい。\n自分の思っていることをきれいに伝えることができるようになりたい。\n端的に、わかりやすく要点を押さえて説明できるようになりたい。"},{"name":"中村綾音","category":"ユース選抜","text":"•社会、社員、家族全てを幸せにしている社長と出会いたい。\n•社会人と協働したい\n•三木さん方が、世界をどのように捉えているか知りたい。\n•社会を動かす経験をしたい"},{"name":"木村友大","category":"企業選抜","text":"・やらないで後悔するより何事にも挑戦したい\n・共に高め合える人"},{"name":"池田えり","category":"企業選抜","text":"Neo以外のコミュニティも巻き込んだ企画への挑戦\n起業したい人、起業した人の話を聞く"},{"name":"岩崎俊太","category":"ユース選抜","text":"人を巻き込めるようなリーダーシップの高い人と一緒にいる\n自分が主体となって周りを引っ張る\n様々な自分の興味のあるプロジェクトに取り組む\nNEOによって暇な時間を潰す"},{"name":"山本秀太","category":"企業選抜","text":"自ら手を挙げて挑戦し、失敗も含めて経験を積む。特に、自分から人を巻き込む機会を意識的に増やしたい。"},{"name":"太田圭吾","category":"ユース選抜","text":"アカデミア生全員と話す。\nNEOの事務局、企業選抜生から学び吸収する。\n1歩踏み出せていない人と出会いたい。\n企業の課題解決や新規事業立ち上げのリアルに触れる。"},{"name":"天野総太","category":"企業選抜","text":"・主体性、積極性(自分自身にない能力が)ある人と出会いたい"},{"name":"小畑　敏力","category":"企業選抜","text":"・自分の力で成長するために0から1を作る挑戦をする\n・世代関係なく頑張っている人と一緒に頑張っていく"},{"name":"吉田　奈緒子","category":"企業選抜","text":"・人事・広報・企業PRの視点での活動やAIスキルなど、今の仕事に役立つことも学んでいきたい\n・三木会長・三木校長や他事務局のみなさまのように、実行力のある経営者やリーダーの皆様からお話を伺いながら、会社では経験できないような新たなことにチャレンジしてみたい（海外事業に興味があります）"},{"name":"松下遼","category":"企業選抜","text":"圧倒的リーダー\n新規事業の立ち上げ"},{"name":"池崎バンジャマン太郎","category":"企業選抜","text":"・現在構想している「まなびばクエスト」のような冒険型教育事業を、実現可能な事業計画に落とし込みたいです。\n・自然科学、南阿蘇での宿泊体験、企業訪問、探究活動、子どもたちへの学習支援を組み合わせた教育モデルを磨きたいです。\n・自分一人の思いで終わらせず、多くの大人を巻き込み、子どもたちを外の世界へ連れ出す事業に育てたいです。\n・児童養護施設、ひとり親家庭、家庭環境に課題がある子どもたちにも、企業スポンサーを通じて体験機会を届ける仕組みを作りたいです。\n・社会貢献で終わらせるのではなく、一般家庭向けの有料プログラムや企業協賛によって、持続可能な収益モデルを構築したいです。\n・企業スポンサーを巻き込む提案力、事業計画力、ブランド設計力、組織づくりの力を高めたいです。\n・福岡・熊本から始め、将来的に日本各地へ広げられる教育事業の形を考えたいです。\n・地域や社会を本気で良くしようとしている経営者と出会いたいです。\n・同年代で情熱あふれる人とつながりたいです。\n・子ども支援、児童福祉、自然体験、科学教育、行政連携、企業CSRに詳しい人と出会いたいです。"},{"name":"西原鷹太（ニシハラヨウタ）","category":"ユース選抜","text":"今福岡を背負ってる人たちと出会い、自分も引っ張っていく1人として何ができるか見つけていきたい。"},{"name":"伊東大樹","category":"企業選抜","text":"NEO福岡に参画している企業を巻き込みながら、まずアカデミア生で社会課題を設定し、その課題解決につながる可能性のある企業同士を結び付けていきたいです。さらに、NEO参画企業だけでなく、そこに紐づく協力企業も含めて連携を広げ、より多くの力を集めながら社会課題の解決に挑戦していきたいと考えています。"},{"name":"黒瀬　継太","category":"企業選抜","text":"・他企業の違う考え方を持った方とグループを作り、プロジェクトを立ち上げこれまでにない企画など実践していきたい。\n・リーダーシップを発揮して会社に貢献している方や起業して成功されている方（どのような考え方をされているのか知りたい。）"},{"name":"篠原浩佑","category":"企業選抜","text":"様々な人と関わって、いろいろな刺激を受けたい。\nチームでプロジェクトを立ち上げ推進する。"},{"name":"金子照生","category":"企業選抜","text":"・一見すると「アホすぎるやろ！」と思えるようなアイデアを出せる人\n・周りに伝播するほどの強い熱量を持っている人\n・何か面白いことをやりたいと考えている人"},{"name":"國政　雄太郎","category":"ユース選抜","text":"社会人の方とたくさん関わり自分に足りないものを知り学びたい\n困難を乗り越え大きなことを成し遂げている人に出会い、何かを成し遂げている人の共通点などを学びたい\nワクワクすることにより出会いたい\n人　物　金の流れを学びたい\nどうして三木兄弟が福岡でこんなに沢山の人や企業から応援されて、いるのか本質的な事を学びたい\n自分と全く違う考え方をする人に出会いたい\n戦友みたいな仲間に出会いたい"},{"name":"岩本　洸","category":"企業選抜","text":"・仲間と地域活性化に対する何かをして、社会の役に立っていることを肌身で感じること\n・自分に無いものを持っている尊敬できる人にたくさん出会いたい"},{"name":"桑野櫻子","category":"ユース選抜","text":"・やりたいこと、気持ち、感謝などを言葉にして伝わるように伝える\n・いろいろな人と共有や壁打ちをしていい意味でぶつかっていく\n・キツそう厳しそうと思うことに飛び込む、挑戦する"},{"name":"新飼然生","category":"ユース選抜","text":"大勢の前で自分の考えを話す。\n経験豊富な人や、自分にない価値観を持つ人に会いたい。\n自分の限界をぶち破りたい。"},{"name":"秋穂朱花","category":"ユース選抜","text":"いろんな役割に挑戦する\n挑戦し続ける人・応援してくれる人に出会いたい！\n沢山の人と話す"},{"name":"大西雄大","category":"ユース選抜","text":"熱量持ってなにかに取り組んでいる人\n羞恥心をなくそうとしてる人\n自分の殻を破ろうとしてる人、した人\n自分をこの人やばいと圧倒させてくれる人！"},{"name":"井上菜歩","category":"企業選抜","text":"普段話さない業界、年齢の方"},{"name":"大場　明典","category":"企業選抜","text":"・ビジョンを出し合い、意見・アイデアを戦いあわせ高め合える人と出会いたい"},{"name":"杉本光","category":"ユース選抜","text":"出会う人ぜんいんから学び吸収する。意見も非難も自分の糧にする。"},{"name":"飯森航大","category":"企業選抜","text":"・世界を良くする活動であれば何でも。今よりももっと大きな影響力で貢献出来たら理想的。\n・ロールモデルとなるような師匠、メンター\n・同志"},{"name":"久保山亜美","category":"企業選抜","text":"・チームの育成やマネジメントに注力している人に出会いたい。\n・仲間とともに、困難を乗り越える達成感を味わいたい！\n・課題を見つけ、解決に向けたディスカッションを重ね、ぶつかったとしてもみんなで意見をまとめられる経験をしたい。"},{"name":"原口知佳","category":"ユース選抜","text":"福岡の企業、地域と新しい形の観光サービスを共創したいです。また、志が高く挑戦している人や、自分にない視点を持っている人と出会い、自分の考えを広げたいです。"},{"name":"今村大智","category":"ユース選抜","text":"自分で事業を立案して実行までしたい。\n起業した人の決断の時の心境が気になります。"},{"name":"東原陽世","category":"ユース選抜","text":"無理だと思わないでまずやってみる。\n自分の可能性を信じる\n熱い思いを持った人に刺激され人生もっと頑張りたい"},{"name":"松下優司","category":"ユース選抜","text":"修羅場\nビジョンから最高までつながる経験\n目標にしたい人\n人を集まる体験"},{"name":"柴田梨愛","category":"ユース選抜","text":"チームをリーダーとしてまとめてみたいです。\n今までの常識を覆せるような考え、価値観のある人と出会いたいです。\n壁にぶち当たったときもチームのみんなで乗り越えていきたいです"},{"name":"永岡　大寿","category":"企業選抜","text":"挑戦：０から企画\n経験：人を巻き込む\n出会いたい人：上田　信行"},{"name":"吉田颯太朗","category":"企業選抜","text":"頭のいい人、ポジティブ思考ができる人、議論のできる人、\n人生の意味についてよく考える人。"},{"name":"笹川嵩孔","category":"企業選抜","text":"やり抜く力を身近で見てみて刺激や学びを得る"},{"name":"中村亮太","category":"企業選抜","text":"熱量が高い人"},{"name":"岡松倭","category":"企業選抜","text":"全て学びに行き実際に何が自分で活かせるのか何をすぐに実践できるのかを考えてアクションまで繋げる回数を増やすこと"},{"name":"萬木","category":"企業選抜","text":"とにかく、いろんな方と話してみたい。"},{"name":"篠原隆太郎","category":"企業選抜","text":"１からプロジェクトを立ち上げる経験をしてみたい。リスクをとって挑戦している人の考え方を聞いてみたい。"},{"name":"椎葉良輝","category":"企業選抜","text":"自分の偏見を外して、いろんな人たちと交流し、新しい価値を生み出す可能性を見出す"},{"name":"向井慶介","category":"企業選抜","text":"パッションすごい人に出会って刺激を貰いたい\nめっちゃ失敗した人に出会って教訓を教えてもらいたい"}]},{"field":"insights","label":"グループでの気づき","answers":[{"name":"西岡恭侑","category":"ユース選抜","text":"みんな違う想い、信念でやりたいことを持ち、誰か、地域のために何かをしたい素敵な人がいっぱいいて、そんな人達と何かに取り組める貴重な環境だと思いました。"},{"name":"渕脇大翔","category":"ユース選抜","text":"それぞれのビジョンが混ざり合った先に人としての新たな形ができていくと思いました！"},{"name":"吉田将吾","category":"ユース選抜","text":"2期生の圧倒的な行動量に焦りを感じましたが、それを「努力の必要性」と捉え、全員をライバルとしてリスペクトしながら切磋琢磨したいと強く思いました。自分の試行回数の少なさや言語化の甘さを痛感したため、今後は常に「提案に乗った先の未来」を思考し続け、自分の時間を人生の糧にする意識を常に持ちたいです"},{"name":"小場川千花子","category":"ユース選抜","text":"一人ひとり、思い描いてるものは違うし、考え方も違って、自分の中で新しい気づきを得れてとっても楽しかった。グループで話してると、その人たちからの熱量がすごくて、私も頑張らないとって思いました。"},{"name":"田畑紗那","category":"企業選抜","text":"お二人とは違った視点でなりたい姿を書けたのでよかったです。プログラム終了後の私たちがどうなっているのかさらに楽しみになりました！"},{"name":"野中信之介","category":"企業選抜","text":"今まで社内でどのような考えで仕事をしてきたかで、このNEO ACADEMIAに挑む気持ちもそれぞれ違うのだなと思いました。\nそれぞれが掲げる目標は個人ごとで比べる必要がなく、1年後に今の自分よりも成長したと思えるように全員で協力していきたいと思いました。"},{"name":"渡邊詩麻","category":"ユース選抜","text":"話している時の相槌を声に出すことが大切"},{"name":"平田匠","category":"ユース選抜","text":"大学生の頃、この内容を言語化できていた自身はないので、今の自分だからこそ伝えられることを学生に共有していきたい"},{"name":"井手壱彩","category":"ユース選抜","text":"似たような考えを持つ人、全く違う考えを持つ人がいて面白かったです。僕の抽象的な表現を経緯から考える機会となり、アウトプットすればするほど自己理解が深まりました。"},{"name":"大宅花奈","category":"ユース選抜","text":"メンバーそれぞれが全く違う切り口でビジョンや大切にしたい価値観を持っていておもしろかった。全員の価値観に触れたい。"},{"name":"堀口真大朗","category":"ユース選抜","text":"意外とみんながしたいことで何かしら似ているところがあったこと。"},{"name":"前山 奈央","category":"企業選抜","text":"今回は体調不良で休んでしまったため、グループでのビジョン共有には参加できず、気づきを得る機会がありませんでした。\n次回以降は、他の方の考えや価値観にも触れながら、自分自身のビジョンをより深めていきたいです。"},{"name":"城川士道","category":"ユース選抜","text":"目標を具体的に言語化する事は聞いた側に伝わる本気度や意思の共有でとても大切だと感じ、早く自分も夢を明確にして具体的な目標を見つけていきたいと思いました。"},{"name":"山下　直矢(ヒューベストホールディング株式会社)","category":"企業選抜","text":"グループでビジョンの共有をしてみて、新たにこういうビジョン設定があるのかと発見できた部分もあれば、班員の話を聞くことでこれからのネオで行うプロジェクトに対してのモチベーションが上がり刺激を受けました。周りの考えや思いを聞くことでモチベーションが上がる性格なので、より良いものになったと思います。"},{"name":"中山陽友","category":"企業選抜","text":"グループでビジョンを共有した際、自分は『NEOで何を学び、どうなりたいか』を軸に話しましたが、他のメンバーは『会社に何か貢献するためにNEOで何を学びたいか』を軸に話していました。同じ問いに対して、出発点が違うことに気づきました。こういう気づきの連続で何か作り出すことがNEOの目的だと早速実感しました。"},{"name":"恒吉　優希菜","category":"企業選抜","text":"普段の業務内容が全く違う方たちだったので、とても良い刺激になりました。"},{"name":"山内傳太郎","category":"企業選抜","text":"ゼンリンは受け身な3人が揃っていたので3人で能動的な人間になり会社にいい影響を持ち出せるようになりたいと感じた"},{"name":"松井克之","category":"ユース選抜","text":"自分は「キャリア」の領域に強く興味があるのだと再認識できた。\nしかし、多角的な視点から物事を見る、アイデアを考えるという理想のためにキャリアに捉われず、幅広く事象や学問を見ていきたい。"},{"name":"池田えり","category":"企業選抜","text":"自己分析や将来のキャリアについて言語化できている方が多いと感じた"},{"name":"岩崎俊太","category":"ユース選抜","text":"多種多様な目標や価値観を聞けて、その人のこれまでの人生が少しだけ感じられました。"},{"name":"太田圭吾","category":"ユース選抜","text":"自分の想いや考えていることを言語化するのに時間がかかっている。全員が「1人で」ではなくて全員でがんばろうとしている。"},{"name":"天野総太","category":"企業選抜","text":"・「他社様、世代間の意見を取り入れて自社若しくは自分自身の固定観念・常識を破りたい」という意見が出ており、自分自身も他社様、自社外の同世代の方々と意見交換できる場が無かったため、自社を越えて、様々な考え方を聞き、取り入れていきたいという気持ちが芽生えた。"},{"name":"小畑　敏力","category":"企業選抜","text":"自分なりのなりたい姿などはあったが、他の人の話を聞くことでいろいろな考え方があると改めて感じたので、積極的にいろいろな方と関わっていきたいと思いました。"},{"name":"松下遼","category":"企業選抜","text":"開発部門の方の話はとても参考になりました。\nすでに刺激をもらえてるので\n自分も与えられるような知見を広げたい"},{"name":"池崎バンジャマン太郎","category":"企業選抜","text":"自分自身の中で会社員として抑え込んでいたビジョンが一気にあふれてきました。グループでビジョンを共有する中で、自分がやりたいことは単なる教育事業や社会貢献活動ではなく、「子どもたちが外の世界と出会い、自分の存在や可能性を信じられるきっかけをつくること」なのだと改めて気づきました。\nまた、自分自身のこれまでの経験、幼少期に人と違うことに悩んだこと、阿蘇の自然の中で育ったこと、周囲の大人に支えられたこと、教育現場で多くの子どもたちと関わってきたことが、今のビジョンにつながっていると整理できました。\n一方で、ビジョンを突き詰めていく中で、思いだけでは継続できないことも実感しました。子どもたちに愛を注ぎ、挑戦する機会を届けるためには、収益性や組織づくり、企業スポンサーとの連携など、事業として持続可能な形にする必要があります。\n今回共有してみて、自分のビジョンは「誰かを支援する」だけではなく、「子どもたちが人生を面白くできると感じられる社会をつくること」だと感じました。そして、そのためには自分自身も挑戦し、成長し、子どもたちから憧れられる大人であり続けたいと思いました。"},{"name":"西原鷹太（ニシハラヨウタ）","category":"ユース選抜","text":"皆高い目標を持っており、既に結果を出している人もいて自分の未熟さを実感した。"},{"name":"伊東大樹","category":"企業選抜","text":"自分で当然出来ると思っていた事が、相手にとっては苦手としているのを実際に言われて気付きを得ました。\nこのことで、一つ自分の強みとなりうる伸びしろを感じました。"},{"name":"黒瀬　継太","category":"企業選抜","text":"それぞれ違うビジョンを掲げていましたが、向いている方向性は一緒でしたので、共にビジョン達成に向けて頑張ろうと思いました。\nまた、自分の所属している企業しか知らない方がほとんどで他企業の考え方を柔軟に取り入れたい方やアイデアを学びたい方が多いと感じました。私もそうなので、どんどん吸収していければと思います。"},{"name":"篠原浩佑","category":"企業選抜","text":"自分と同じ悩み、想いを抱いている人がいた。"},{"name":"國政　雄太郎","category":"ユース選抜","text":"それぞれが違った目的で参加しておりたくさんの学びがあった。"},{"name":"岩本　洸","category":"企業選抜","text":"個人としてではなく、会社の代表としての自覚を持ちながら12番までで記載したことを実行していきたい"},{"name":"桑野櫻子","category":"ユース選抜","text":"その人が大切にしていることが伝わってきた。\n自分の大切にしたいことや目標も明確になった。\n言われてみて「たしかに！」って気づくこともたくさんあった。"},{"name":"秋穂朱花","category":"ユース選抜","text":"NEOに入った理由やビジョンは十人十色で自分といい意味で異なる\n人が沢山いるんだろうなと更に楽しみになった。"},{"name":"大西雄大","category":"ユース選抜","text":"みんな完璧そうに見えて実は課題もあるんだなと思った。あとみんな自分を見つめているからこそビジョンの質や価値観のレベルが高かった"},{"name":"大場　明典","category":"企業選抜","text":"書くだけではなく言葉として発することによって、次にどう行動すればいいのかという「アクション」を考え始めていました。行動に移すためには声に出してアウトプット・宣言することが大事であると気づきました。"},{"name":"久保山亜美","category":"企業選抜","text":"それぞれの目指している個性や世界観などが出ており、そんな周りの人たちの良さを最大限に生かせるチームを作り、ミッションに取り組みたいと思いました。今回のグループは同じ会社の同じ同期でしたので、チームを組むときには別々になるとは思いますが、お互いに切磋琢磨しあえる仲間として頑張っていきたいです！"},{"name":"原口知佳","category":"ユース選抜","text":"人によって価値観や目指している方向が違うことを実感しました。その違いを理解することが、自分にとっての新しい価値を生むきっかけになると感じました。"},{"name":"東原陽世","category":"ユース選抜","text":"みんな「周囲を楽しませたい」と考えていて自分と似ていました"},{"name":"柴田梨愛","category":"ユース選抜","text":"やはりビジョンを共有してみると自分よりも具体的で解像度の高いビジョンが浮かんでいる人が多いと感じたので今から、将来のビジョンの解像度を高めていけるようにしたいです。\n自分にはなかった考えを知ることができてとてつもなく楽しく、ワクワクした有意義な時間でした。"},{"name":"永岡　大寿","category":"企業選抜","text":"イメージを言語化することはできるが、イメージを作るまでに時間がかかる"},{"name":"萬木","category":"企業選抜","text":"自分の思いを文字にできる事はすごい事だと感じた。ロードマップ、ビジョンが明確だった。"},{"name":"椎葉良輝","category":"企業選抜","text":"ありのままの自分を思いきり発揮して楽しみたいと思いました！"}]}];
const SUMCOLS=['#FF6B35','#9B59B6','#F39C12','#1ABC9C','#E91E8C','#3498DB','#ffd43b','#f783ac','#74c0fc','#4dabf7','#a9e34b'];
let sumCache={}, sumActive=null;

function renderSum(){
  const el=document.getElementById('pg-sum');
  const cards=SUMDATA.map((q,i)=>{
    const c=SUMCOLS[i%SUMCOLS.length];
    const cached=sumCache[q.field];
    let body='';
    if(cached==='loading'){
      body=`<div class="sc-loading"><div class="spin"></div><span>Claude が分析中…</span></div>`;
    } else if(cached){
      const kws=(cached.keywords||[]).map(k=>`<span class="sc-kw">${k}</span>`).join('');
      body=`<div class="sc-summary">${cached.summary}</div><div class="sc-keywords">${kws}</div>`;
    } else {
      body=`<div class="sc-placeholder">クリックして AI 分析を実行</div>`;
    }
    return`<div class="sum-card${cached==='loading'?' loading':cached?' done':''}" id="sc-${q.field}" onclick="runSum('${q.field}',${i})" style="${cached&&cached!=='loading'?'border-color:'+c+'44':''}">
      <div class="sc-head">
        <div class="sc-num" style="${cached&&cached!=='loading'?`background:${c}1a;color:${c}`:''}">${i+1}</div>
        <div class="sc-label">${q.label}</div>
        <div class="sc-cnt">${q.answers.length}名</div>
      </div>
      <div class="sc-body">${body}</div>
    </div>`;
  }).join('');
  
  const detailHtml=`<div class="sum-detail${sumActive?' on':''}" id="sum-detail">
    ${sumActive?renderSumDetail(sumActive):''}
  </div>`;
  
  el.innerHTML=`
    <div class="sum-all-btn">
      <button class="sa-btn primary" onclick="runAllSum()">▶ 全設問を一括分析</button>
      <span style="font-size:.78rem;color:#444">各カードをクリックで個別分析 ／ 分析後クリックで全回答一覧を表示</span>
    </div>
    <div class="sum-grid">${cards}</div>
    ${detailHtml}`;
}

function renderSumDetail(field){
  const q=SUMDATA.find(x=>x.field===field);
  const cached=sumCache[field];
  if(!q||!cached||cached==='loading') return '';
  const kws=(cached.keywords||[]).map(k=>`<span class="sc-kw">${k}</span>`).join('');
  const answers=q.answers.map(a=>`<div class="sd-ans"><div class="sd-ans-name">${a.name}（${a.category}）</div><div class="sd-ans-text">${a.text}</div></div>`).join('');
  return`<div class="sd-head"><div class="sd-title">Q: ${q.label}</div><button class="sd-close" onclick="closeSumDetail()">✕ 閉じる</button></div>
    <div class="sd-summary">${cached.summary}</div>
    <div style="font-size:.72rem;letter-spacing:.1em;color:#e8ff00;text-transform:uppercase;margin-bottom:.6rem;font-weight:700">キーワード</div>
    <div class="sc-keywords" style="margin-bottom:1.2rem">${kws}</div>
    <div style="font-size:.72rem;letter-spacing:.1em;color:#e8ff00;text-transform:uppercase;margin-bottom:.6rem;font-weight:700">全回答一覧（${q.answers.length}名）</div>
    <div class="sd-answers">${answers}</div>`;
}

function closeSumDetail(){
  sumActive=null;
  document.getElementById('sum-detail').classList.remove('on');
  document.getElementById('sum-detail').innerHTML='';
}

async function runSum(field, idx){
  if(sumCache[field] && sumCache[field]!=='loading'){
    // 既に分析済み → 詳細を開く
    sumActive=field;
    const det=document.getElementById('sum-detail');
    if(det){det.innerHTML=renderSumDetail(field);det.classList.add('on');det.scrollIntoView({behavior:'smooth',block:'start'});}
    return;
  }
  if(sumCache[field]==='loading') return;
  sumCache[field]='loading';
  renderSum();
  
  const q=SUMDATA.find(x=>x.field===field);
  const allText=q.answers.map(a=>`・${a.name}（${a.category}）: ${a.text}`).join('\n');
  const prompt=`NEO ACADEMIA（福岡の若手リーダー育成プログラム）の3期生76名の事前研修後課題です。
設問「${q.label}」に対する全${q.answers.length}名の回答を分析してください。

【全回答】
${allText}

以下のJSON形式のみで出力してください（前置き・後置き不要）：
{
  "summary": "200〜300字程度で、回答全体の傾向・共通点・特徴的な視点をわかりやすくまとめる。箇条書きではなく文章で。",
  "keywords": ["頻出・特徴的なキーワードを8〜12個"]
}`;

  try{
    const res=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        model:'claude-sonnet-4-20250514',
        max_tokens:1000,
        messages:[{role:'user',content:prompt}]
      })
    });
    const data=await res.json();
    const text=data.content?.[0]?.text||'{}';
    const clean=text.replace(/```json|```/g,'').trim();
    const parsed=JSON.parse(clean);
    sumCache[field]=parsed;
  } catch(e){
    sumCache[field]={summary:'分析中にエラーが発生しました。再度お試しください。',keywords:[]};
  }
  sumActive=field;
  renderSum();
  setTimeout(()=>{
    const det=document.getElementById('sum-detail');
    if(det) det.scrollIntoView({behavior:'smooth',block:'start'});
  },100);
}

async function runAllSum(){
  for(let i=0;i<SUMDATA.length;i++){
    const q=SUMDATA[i];
    if(!sumCache[q.field]||sumCache[q.field]==='loading') continue;
  }
  // 未分析のものを順に実行（並列だとAPI制限に当たるので順番に）
  const pending=SUMDATA.filter(q=>!sumCache[q.field]);
  for(let i=0;i<pending.length;i++){
    await runSum(pending[i].field, SUMDATA.findIndex(x=>x.field===pending[i].field));
    await new Promise(r=>setTimeout(r,300));
  }
}

</script>
